<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>µFlow — 3D Microfluidic Hall Sensor Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a14;--card:#0d1424;--card-border:#1a2540;
  --primary:#06b6d4;--primary-dim:#0e7490;
  --signal:#22c55e;--bead:#f59e0b;
  --sensor:#a78bfa;--sensor-bright:#c4b5fd;
  --text:#e2e8f0;--muted:#64748b;--subtle:#1e293b;
  --danger:#ef4444;--gold:#f59e0b;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#root{height:100%}

/* ── Layout ── */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:52px 1fr 200px;height:100%}
.app.designer-mode{grid-template-columns:1fr;grid-template-rows:52px 1fr;overflow:hidden}

/* ── Header ── */
.header{grid-column:1/-1;display:flex;align-items:center;padding:0 20px;gap:16px;background:linear-gradient(180deg,rgba(13,20,36,0.97),rgba(10,16,30,0.95));border-bottom:1px solid var(--card-border);backdrop-filter:blur(8px);z-index:10}
.header-brand{display:flex;align-items:baseline;gap:6px;min-width:0}
.header-brand h1{font-size:15px;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.header-brand h1 .brand{color:var(--primary)}
.header-brand .sub{font-size:9.5px;color:var(--muted);white-space:nowrap}
.nav-tabs{display:flex;gap:2px;background:var(--subtle);padding:3px;border-radius:8px;margin-left:24px}
.nav-tab{font-size:11px;padding:5px 16px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{background:var(--primary);color:var(--bg);font-weight:600}
.header-metrics{display:flex;gap:16px;margin-left:auto}
.metric{text-align:right}
.metric-label{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;color:var(--primary)}
.metric-value.g{color:var(--signal)}.metric-value.b{color:var(--bead)}.metric-value.r{color:var(--danger)}

/* ── Sidebar ── */
.sidebar{overflow-y:auto;padding:12px;border-right:1px solid var(--card-border);background:rgba(10,16,30,0.97);z-index:5;grid-row:2/4}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}
.group{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(30,41,59,0.4)}
.group:last-child{border-bottom:none}
.group-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.group-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--primary)}
.group-title.mat::before{background:var(--sensor)}
.group-title.bead::before{background:var(--bead)}
.group-title.ch::before{background:#3b82f6}
.group-title.det::before{background:var(--danger)}

/* ── Sliders & Inputs ── */
.slider-row{margin-bottom:5px}
.slider-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1px}
.slider-name{font-size:11px;color:#cbd5e1}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--primary)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--subtle);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid var(--bg)}
input[type=range]:disabled{opacity:0.4}
.num-input{width:76px;background:rgba(30,41,59,0.6);border:1px solid var(--card-border);color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:4px 6px;border-radius:5px;text-align:right;outline:none;transition:border-color 0.15s}
.num-input:focus{border-color:var(--primary)}
.num-input:disabled{opacity:0.4}
.input-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.input-row label{font-size:10.5px;color:#cbd5e1}
.input-row .unit{font-size:9px;color:var(--muted);margin-left:4px}

/* ── Preset pills ── */
.preset-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.preset-btn{font-size:9px;padding:3px 8px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.preset-btn:hover{border-color:var(--primary);color:var(--primary)}
.preset-btn.active{background:var(--primary);color:var(--bg);border-color:var(--primary);font-weight:600}
.preset-btn:disabled{opacity:0.4;cursor:default}

/* ── Mode toggle ── */
.mode-tabs{display:flex;gap:2px;margin-bottom:6px}
.mode-tab{flex:1;text-align:center;font-size:9.5px;padding:4px;border-radius:4px;border:1px solid var(--subtle);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.mode-tab:disabled{opacity:0.4;cursor:default}
.mode-tab.active{background:var(--primary);color:var(--bg);border-color:var(--primary);font-weight:600}

/* ── Info text ── */
.sim-info{font-size:10px;color:var(--muted);line-height:1.5;margin-top:2px}
.sim-info b{color:#94a3b8;font-weight:500}
.note{font-size:8.5px;color:#475569;line-height:1.4;margin-top:3px;font-style:italic}
.eq{font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;padding:4px 8px;background:rgba(6,182,212,0.04);border-radius:4px;border-left:2px solid var(--primary-dim);margin:4px 0}

/* ── Results ── */
.results-box{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.15);border-radius:6px;padding:8px;margin-top:4px}
.results-box .rtitle{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin-bottom:4px}
.results-box .row{display:flex;justify-content:space-between;font-size:10px;line-height:1.6}
.results-box .row .lbl{color:var(--muted)}
.results-box .row .val{font-family:'JetBrains Mono',monospace;color:var(--text)}
.results-box .row .val.good{color:var(--signal)}
.results-box .row .val.warn{color:var(--bead)}

/* ── Status badges ── */
.status-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px}
.status-badge.idle{background:var(--subtle);color:var(--muted)}
.status-badge.running{background:rgba(5,150,105,0.2);color:#34d399;animation:pulse 1.5s infinite}
.status-badge.done{background:rgba(6,182,212,0.15);color:var(--primary)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── Pulse table ── */
.pulse-table{width:100%;margin-top:6px;font-size:9px;border-collapse:collapse}
.pulse-table th{color:var(--muted);text-align:left;font-weight:500;padding:2px 4px;border-bottom:1px solid var(--subtle)}
.pulse-table td{padding:2px 4px;font-family:'JetBrains Mono',monospace;color:#94a3b8;border-bottom:1px solid rgba(30,41,59,0.4)}
.pulse-table td.det{color:var(--signal)}
.pulse-table td.miss{color:var(--danger)}

/* ── 3D Scene & Trace ── */
.scene-container{position:relative;overflow:hidden;background:var(--bg)}
.scene-container canvas{display:block;width:100%!important;height:100%!important}
.trace-panel{border-top:1px solid var(--card-border);background:rgba(8,12,24,0.95);position:relative}
.trace-panel canvas{display:block;width:100%;height:100%}
.trace-label{position:absolute;top:6px;left:10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);z-index:1;pointer-events:none}
.ctrl-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5}
.ctrl-btn{font-size:10px;padding:5px 16px;border-radius:6px;border:1px solid var(--subtle);background:rgba(13,20,36,0.85);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;backdrop-filter:blur(4px);transition:all 0.15s}
.ctrl-btn:hover{border-color:var(--primary);color:var(--primary)}
.ctrl-btn.active{background:var(--primary);color:var(--bg);border-color:var(--primary)}
.ctrl-btn.run{background:#059669;color:white;border-color:#059669}
.ctrl-btn.run:hover{background:#047857}
.ctrl-btn.danger{border-color:var(--danger);color:var(--danger)}

/* ══════ DESIGNER PAGE ══════ */
.designer-wrap{overflow-y:auto;padding:24px 32px;height:calc(100vh - 52px)}
.designer-wrap::-webkit-scrollbar{width:5px}
.designer-wrap::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:3px}
.designer-title{font-size:20px;font-weight:700;margin-bottom:4px}
.designer-subtitle{font-size:12px;color:var(--muted);margin-bottom:24px}
.designer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;margin-bottom:24px}
.d-card{background:linear-gradient(145deg,var(--card),#0a1020);border:1px solid var(--card-border);border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.02);transition:border-color 0.2s}
.d-card:hover{border-color:rgba(6,182,212,0.3)}
.d-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.d-card-title .dot{width:8px;height:8px;border-radius:50%}

/* Material cards */
.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mat-card{padding:10px 12px;border-radius:8px;border:1px solid var(--subtle);background:rgba(30,41,59,0.2);cursor:pointer;transition:all 0.2s}
.mat-card:hover{border-color:var(--primary-dim);background:rgba(6,182,212,0.05)}
.mat-card.selected{border-color:var(--primary);background:rgba(6,182,212,0.08);box-shadow:0 0 12px rgba(6,182,212,0.1)}
.mat-card .mat-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.mat-card .mat-sub{font-size:9px;color:var(--muted)}
.mat-card .mat-accent{width:100%;height:2px;border-radius:1px;margin-bottom:6px}

/* Bead cards on designer */
.bead-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:10px}
.bead-card{padding:8px 10px;border-radius:7px;border:1px solid var(--subtle);background:rgba(30,41,59,0.2);cursor:pointer;transition:all 0.15s;text-align:center}
.bead-card:hover{border-color:var(--bead)}
.bead-card.selected{border-color:var(--bead);background:rgba(245,158,11,0.08);box-shadow:0 0 8px rgba(245,158,11,0.1)}
.bead-card .bead-name{font-size:10px;font-weight:600;color:var(--text)}
.bead-card .bead-sub{font-size:9px;color:var(--muted)}

/* Props table */
.props-table{width:100%;border-collapse:collapse;margin:8px 0}
.props-table td{padding:3px 0;font-size:10.5px;border-bottom:1px solid rgba(30,41,59,0.3)}
.props-table td:first-child{color:var(--muted)}
.props-table td:last-child{font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right}
.props-table td.computed{color:var(--primary)}
.d-input-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.d-input-row label{font-size:11px;color:#cbd5e1}
.d-num-input{width:100px;background:rgba(30,41,59,0.5);border:1px solid var(--card-border);color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;border-radius:5px;text-align:right;outline:none}
.d-num-input:focus{border-color:var(--primary)}
.apply-btn{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#059669,#06b6d4);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;letter-spacing:0.5px}
.apply-btn:hover{opacity:0.9}
.divider{height:1px;background:var(--card-border);margin:10px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

const{useState,useEffect,useRef,useMemo,useCallback}=React;
const h=React.createElement;

// ══════════════════════════════════════════════════════════════════════════════
// PHYSICS ENGINE
// Based on: Govindaraju & Hassan, Sensors & Actuators: A. Physical 393 (2025)
// ══════════════════════════════════════════════════════════════════════════════
const MU0 = 4*Math.PI*1e-7;
const EC  = 1.602176634e-19;

function beadMoment(r, mu_r, B0) {
  const chi = 3*(mu_r - 1)/(mu_r + 2);
  return (4/3)*Math.PI*r*r*r * chi * B0 / MU0;
}

function dipBz(m, dx, dy, dz) {
  const r2 = dx*dx + dy*dy + dz*dz;
  if (r2 < 1e-30) return 0;
  return (MU0/(4*Math.PI)) * m * (2*dz*dz - dx*dx - dy*dy) / Math.pow(r2, 2.5);
}

function volumeAvgBz(m, bx, by, r, sW, t, nxy, nz) {
  nxy = nxy || 10; nz = nz || 3;
  const hw = sW/2, stxy = sW/nxy, stz = t/nz;
  let total = 0;
  for (let iz = 0; iz < nz; iz++) {
    const dz = r + (iz + 0.5)*stz;
    for (let ix = 0; ix < nxy; ix++) {
      const sx = -hw + (ix + 0.5)*stxy;
      for (let iy = 0; iy < nxy; iy++) {
        const sy = -hw + (iy + 0.5)*stxy;
        total += dipBz(m, bx - sx, by - sy, dz);
      }
    }
  }
  return total / (nxy * nxy * nz);
}

function flowVelocity(y, H, vAvg) {
  const eta = 2*y/H - 1;
  return 1.5*vAvg*(1 - eta*eta);
}

// Compute material-derived Hall properties
function computeMatProps(mat) {
  const mu_SI = mat.mu * 1e-4; // cm²/Vs → m²/Vs
  const RH = (mat.dim === '2D') ? 1/(mat.n * EC) : 1/(mat.n * EC);
  const sigma = mat.n * EC * mu_SI;
  const SI = Math.abs(RH);
  return { RH, sigma, SI, mu_SI };
}

// ══════════════════════════════════════════════════════════════════════════════
// MATERIAL & BEAD LIBRARIES
// ══════════════════════════════════════════════════════════════════════════════
const MATERIALS = [
  {id:'graphene', name:'Graphene (CVD)', mu:3000, n:5e15, dim:'2D', color:'#06b6d4',
   desc:'Monolayer CVD graphene on SiO\u2082/Si', ref:'Xu 2013, Petit 2024'},
  {id:'graphene-hbn', name:'Graphene/hBN', mu:15000, n:2e15, dim:'2D', color:'#22d3ee',
   desc:'hBN-encapsulated graphene, ultra-high mobility', ref:'Dauber 2015'},
  {id:'insb', name:'InSb (MBE)', mu:70000, n:2e22, dim:'3D', color:'#f59e0b',
   desc:'Indium antimonide thin film on GaAs', ref:'Togawa 2005'},
  {id:'gaas', name:'GaAs 2DEG', mu:8000, n:5e15, dim:'2D', color:'#a78bfa',
   desc:'GaAs/AlGaAs two-dimensional electron gas', ref:'Aledealat 2009'},
  {id:'si', name:'Silicon CMOS', mu:1400, n:1e22, dim:'3D', color:'#94a3b8',
   desc:'N-type Si, standard 0.35 \u00b5m CMOS', ref:'Besse 2002'},
];

const BEAD_LIBRARY = [
  {id:'nanomag',  name:'nanomag-D 250',    d:0.25e-6,  mu_r:40, label:'250 nm', ref:'Micromod'},
  {id:'speed',    name:'SpeedBeads',        d:0.89e-6,  mu_r:10, label:'890 nm', ref:'Cytiva'},
  {id:'myone',    name:'Dynabeads MyOne',   d:1.05e-6,  mu_r:10, label:'1.05 \u00b5m', ref:'Thermo Fisher'},
  {id:'m280',     name:'Dynabeads M-280',   d:2.83e-6,  mu_r:10, label:'2.83 \u00b5m', ref:'Thermo Fisher'},
  {id:'m450',     name:'Dynabeads M-450',   d:4.5e-6,   mu_r:10, label:'4.5 \u00b5m', ref:'Thermo Fisher'},
  {id:'mag2',     name:'Magnetite 2 \u00b5m',  d:2e-6,  mu_r:10, label:'2 \u00b5m', ref:'Generic'},
  {id:'mag6',     name:'Magnetite 6 \u00b5m',  d:6e-6,  mu_r:10, label:'6 \u00b5m', ref:'Generic'},
  {id:'mag10',    name:'Magnetite 10 \u00b5m', d:10e-6, mu_r:10, label:'10 \u00b5m', ref:'Generic'},
];

const SENSOR_PRESETS = [
  {name:'I',   size:5e-6,  t:0.5e-6, label:'5\u00d75 \u00b5m'},
  {name:'II',  size:10e-6, t:1e-6,   label:'10\u00d710 \u00b5m'},
  {name:'III', size:50e-6, t:1e-6,   label:'50\u00d750 \u00b5m'},
];

// ══════════════════════════════════════════════════════════════════════════════
// UI COMPONENTS
// ══════════════════════════════════════════════════════════════════════════════
function Slider({label, value, min, max, step, unit, onChange, disabled}) {
  const s = step || 1;
  const fmt = s < 0.01 ? value.toFixed(3) : s < 0.1 ? value.toFixed(2) : s < 1 ? value.toFixed(1) : Math.round(value);
  return h('div',{className:'slider-row'},
    h('div',{className:'slider-header'},
      h('span',{className:'slider-name'},label),
      h('span',{className:'slider-val'},fmt+(unit||''))
    ),
    h('input',{type:'range',min,max,step:s,value,disabled:!!disabled,
      onChange:e=>onChange(+e.target.value)})
  );
}

function NumField({label, value, unit, onChange, min, max, step, disabled}) {
  return h('div',{className:'input-row'},
    h('label',null,label),
    h('span',null,
      h('input',{type:'number',className:'num-input',value,min,max,step:step||'any',disabled:!!disabled,
        onChange:e=>onChange(+e.target.value)}),
      unit && h('span',{className:'unit'},unit)
    )
  );
}

function fmtSci(v, d) {
  if (v === 0) return '0';
  const exp = Math.floor(Math.log10(Math.abs(v)));
  if (Math.abs(exp) <= 2) return v.toFixed(d || 4);
  return (v / Math.pow(10, exp)).toFixed(d || 2) + '\u00d710' + superscript(exp);
}
function superscript(n) {
  const s = n.toString();
  return s.replace(/[-]/g,'\u207b').replace(/0/g,'\u2070').replace(/1/g,'\u00b9').replace(/2/g,'\u00b2').replace(/3/g,'\u00b3').replace(/4/g,'\u2074').replace(/5/g,'\u2075').replace(/6/g,'\u2076').replace(/7/g,'\u2077').replace(/8/g,'\u2078').replace(/9/g,'\u2079');
}

// ══════════════════════════════════════════════════════════════════════════════
// 3D SCENE MANAGER (unchanged from original)
// ══════════════════════════════════════════════════════════════════════════════
class FluidScene {
  constructor(container) {
    this.container = container;
    const W = container.clientWidth, H = container.clientHeight;
    this.renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(W, H);
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.2;
    container.appendChild(this.renderer.domElement);
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x060a14);
    this.scene.fog = new THREE.FogExp2(0x060a14, 0.005);
    this.camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 500);
    this.camera.position.set(22, 16, 22);
    this.camera.lookAt(0, 1, 0);
    this.controls = new OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.08;
    this.controls.target.set(0, 1, 0);
    this.controls.minDistance = 8;
    this.controls.maxDistance = 60;
    this.scene.add(new THREE.AmbientLight(0x334466, 0.6));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8);
    dl.position.set(10, 20, 10); this.scene.add(dl);
    const dl2 = new THREE.DirectionalLight(0x4488cc, 0.3);
    dl2.position.set(-10, 10, -10); this.scene.add(dl2);
    const grid = new THREE.GridHelper(60, 30, 0x112244, 0x0a1530);
    grid.position.y = -4; this.scene.add(grid);
    this.channelGroup = new THREE.Group(); this.scene.add(this.channelGroup);
    this.chmaGroup = new THREE.Group(); this.scene.add(this.chmaGroup);
    this.buildCHMA();
    this.sensorMesh = null; this.sensorGlow = null;
    this.beadMeshes = [];
    this.beadGeom = new THREE.SphereGeometry(1, 20, 14);
    this.beadMat = new THREE.MeshStandardMaterial({
      color:0xf59e0b, emissive:0xf59e0b, emissiveIntensity:0.3, metalness:0.4, roughness:0.3
    });
    this.sensorLight = new THREE.PointLight(0xa78bfa, 0, 8);
    this.sensorLight.position.set(0, -0.5, 0); this.scene.add(this.sensorLight);
    this._onResize = () => {
      const w = container.clientWidth, hh = container.clientHeight;
      this.camera.aspect = w/hh; this.camera.updateProjectionMatrix();
      this.renderer.setSize(w, hh);
    };
    window.addEventListener('resize', this._onResize);
  }

  buildChannel(sceneLen, sceneH, sceneW) {
    this.channelGroup.clear(); this.chLen = sceneLen;
    const pdmsW = Math.max(sceneW * 3, 8);
    const pdmsGeo = new THREE.BoxGeometry(sceneLen * 1.1, sceneH + 0.6, pdmsW);
    const pdmsMat = new THREE.MeshPhysicalMaterial({color:0x88ccee, transparent:true, opacity:0.03, roughness:0.1, metalness:0, side:THREE.DoubleSide, depthWrite:false});
    const pdms = new THREE.Mesh(pdmsGeo, pdmsMat);
    pdms.position.y = sceneH/2 + 0.3; this.channelGroup.add(pdms);
    const chGeo = new THREE.BoxGeometry(sceneLen, sceneH, sceneW);
    const edges = new THREE.EdgesGeometry(chGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x2a6a9a, transparent:true, opacity:0.5}));
    line.position.y = sceneH/2; this.channelGroup.add(line);
    const chMat = new THREE.MeshPhysicalMaterial({color:0x44aadd, transparent:true, opacity:0.04, side:THREE.DoubleSide, depthWrite:false});
    this.channelGroup.add(new THREE.Mesh(chGeo, chMat)).position.y = sceneH/2;
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(sceneLen, pdmsW), new THREE.MeshStandardMaterial({color:0x1a2a4a, transparent:true, opacity:0.2, side:THREE.DoubleSide}));
    floor.rotation.x = -Math.PI/2; floor.position.y = 0.01; this.channelGroup.add(floor);
    const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(-sceneLen/2 - 2, sceneH/2, 0), 3, 0x06b6d4, 0.6, 0.3);
    this.channelGroup.add(arrow);
    const lc = document.createElement('canvas'); lc.width = 128; lc.height = 32;
    const ctx = lc.getContext('2d'); ctx.fillStyle = '#06b6d4'; ctx.font = 'bold 16px DM Sans'; ctx.fillText('FLOW \u2192', 8, 22);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(lc), transparent:true, opacity:0.5}));
    sp.scale.set(3.5, 0.9, 1); sp.position.set(-sceneLen/2 - 2, sceneH + 0.8, 0); this.channelGroup.add(sp);
  }

  buildSensor(w, t, d) {
    if (this.sensorMesh) { this.scene.remove(this.sensorMesh); this.scene.remove(this.sensorGlow); }
    const geo = new THREE.BoxGeometry(w, Math.max(t, 0.1), d);
    const mat = new THREE.MeshStandardMaterial({color:0x8b5cf6, emissive:0x6d28d9, emissiveIntensity:0.4, metalness:0.6, roughness:0.2});
    this.sensorMesh = new THREE.Mesh(geo, mat);
    this.sensorMesh.position.y = -Math.max(t, 0.1)/2; this.scene.add(this.sensorMesh);
    const glowGeo = new THREE.PlaneGeometry(w * 1.6, d * 1.6);
    this.sensorGlow = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({color:0x8b5cf6, transparent:true, opacity:0.05, side:THREE.DoubleSide}));
    this.sensorGlow.rotation.x = -Math.PI/2; this.sensorGlow.position.y = 0.03; this.scene.add(this.sensorGlow);
  }

  buildCHMA() {
    this.chmaGroup.clear();
    const nMag = 8, radius = 7, magW = 2.5, magH = 2, magD = 2.5;
    for (let i = 0; i < nMag; i++) {
      const angle = (i / nMag) * Math.PI * 2;
      const py = Math.cos(angle) * radius, pz = Math.sin(angle) * radius;
      const isN = i % 2 === 0;
      const mat = new THREE.MeshStandardMaterial({
        color: isN ? 0xdc2626 : 0x2563eb, emissive: isN ? 0x7f1d1d : 0x1e3a5f,
        emissiveIntensity: 0.3, metalness: 0.7, roughness: 0.3
      });
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(magD, magH, magW), mat);
      mesh.position.set(0, py, pz); mesh.lookAt(0, 0, 0); this.chmaGroup.add(mesh);
      const c = document.createElement('canvas'); c.width = 32; c.height = 32;
      const ctx = c.getContext('2d'); ctx.fillStyle = isN ? '#fca5a5' : '#93c5fd';
      ctx.font = 'bold 20px DM Sans'; ctx.textAlign = 'center'; ctx.fillText(isN ? 'N' : 'S', 16, 22);
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(c), transparent: true}));
      sp.scale.set(1.2, 1.2, 1);
      const labelR = radius + 1.8;
      sp.position.set(0, Math.cos(angle)*labelR, Math.sin(angle)*labelR); this.chmaGroup.add(sp);
    }
    const ring = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.12, 8, 32), new THREE.MeshStandardMaterial({color:0x334155, metalness:0.8, roughness:0.2}));
    ring.rotation.y = Math.PI / 2; this.chmaGroup.add(ring);
    for (let xi = -4; xi <= 4; xi += 4) {
      const arrow = new THREE.ArrowHelper(new THREE.Vector3(0, -1, 0), new THREE.Vector3(xi, 3.5, 0), 2.5, 0x06b6d4, 0.4, 0.2);
      arrow.children.forEach(c => { if(c.material) { c.material.transparent=true; c.material.opacity=0.3; }}); this.chmaGroup.add(arrow);
    }
    const bc = document.createElement('canvas'); bc.width = 64; bc.height = 32;
    const bctx = bc.getContext('2d'); bctx.fillStyle = '#06b6d4'; bctx.font = 'bold 14px JetBrains Mono'; bctx.fillText('B\u2080 \u2193', 8, 22);
    const bsp = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(bc), transparent:true, opacity:0.5}));
    bsp.scale.set(2.5, 1, 1); bsp.position.set(0, 4.5, 0); this.chmaGroup.add(bsp);
    const lc = document.createElement('canvas'); lc.width = 320; lc.height = 32;
    const lctx = lc.getContext('2d'); lctx.fillStyle = '#64748b'; lctx.font = '13px DM Sans';
    lctx.fillText('Circular Halbach Magnetic Array (bore \u2016 flow)', 10, 22);
    const lsp = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(lc), transparent:true, opacity:0.4}));
    lsp.scale.set(12, 1.2, 1); lsp.position.set(0, -radius - 2.5, 0); this.chmaGroup.add(lsp);
  }

  getOrCreateBead(idx) {
    while (this.beadMeshes.length <= idx) {
      const m = new THREE.Mesh(this.beadGeom, this.beadMat.clone());
      m.visible = false; this.scene.add(m); this.beadMeshes.push(m);
    }
    return this.beadMeshes[idx];
  }
  updateBeads(positions, rScene) {
    for (let i = 0; i < this.beadMeshes.length; i++) this.beadMeshes[i].visible = false;
    for (let i = 0; i < positions.length; i++) {
      const p = positions[i]; if (!p) continue;
      const mesh = this.getOrCreateBead(i); mesh.visible = true;
      mesh.position.set(p.sx, p.sy, p.sz); mesh.scale.setScalar(rScene);
      mesh.material.emissive.setHex(p.detected ? 0x22c55e : 0xf59e0b);
      mesh.material.emissiveIntensity = p.detected ? 0.6 : (0.2 + p.glow * 0.5);
    }
  }
  setSensorGlow(intensity) {
    this.sensorLight.intensity = intensity * 3;
    if (this.sensorMesh) this.sensorMesh.material.emissiveIntensity = 0.3 + intensity * 0.7;
  }
  render() { this.controls.update(); this.renderer.render(this.scene, this.camera); }
  dispose() {
    window.removeEventListener('resize', this._onResize);
    this.renderer.dispose();
    if (this.renderer.domElement.parentNode) this.container.removeChild(this.renderer.domElement);
  }
}

// DESIGNER PAGE COMPONENT
// ══════════════════════════════════════════════════════════════════════════════
function DesignerPage({matIdx, setMatIdx, customMat, setCustomMat,
  beadIdx, setBeadIdx, beadMode, setBeadMode, customBead, setCustomBead,
  sensMode, setSensMode, sensIdx, setSensIdx, customSensor, setCustomSensor,
  chH, setChH, flowVel, setFlowVel, B0, setB0, goToSim}) {

  const mat = matIdx < MATERIALS.length ? MATERIALS[matIdx] : customMat;
  const isCustomMat = matIdx >= MATERIALS.length;
  const mp = computeMatProps(isCustomMat ? customMat : mat);
  const activeBead = beadMode === 'custom' ? customBead : BEAD_LIBRARY[beadIdx];
  const activeSensor = sensMode === 'custom' ? customSensor : SENSOR_PRESETS[sensIdx];
  const chi = 3*(activeBead.mu_r - 1)/(activeBead.mu_r + 2);
  const mom = beadMoment(activeBead.d/2, activeBead.mu_r, B0*1e-3);
  const peakBz = volumeAvgBz(mom, 0, 0, activeBead.d/2 + 0.5e-6, activeSensor.size, activeSensor.t, 10, 3);
  const peakVH = Math.abs(mp.RH * mp.sigma * peakBz * 5);

  return h('div', {className:'designer-wrap'},
    h('div', {className:'designer-title'}, 'Material & Design Configuration'),
    h('div', {className:'designer-subtitle'}, 'Configure sensor material, bead type, and geometry. Changes apply to the simulator in real time.'),

    h('div', {className:'designer-grid'},
      // ─── Card 1: Hall Sensor Material ───
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--sensor)'}}), 'Hall Sensor Material'),
        h('div', {className:'mat-grid'},
          MATERIALS.map((m, i) =>
            h('div', {key:m.id, className:'mat-card'+(matIdx===i?' selected':''), onClick:()=>setMatIdx(i)},
              h('div', {className:'mat-accent', style:{background:m.color}}),
              h('div', {className:'mat-name'}, m.name),
              h('div', {className:'mat-sub'}, '\u03bc = '+m.mu.toLocaleString()+' cm\u00b2/Vs'),
            )
          ),
          h('div', {className:'mat-card'+(isCustomMat?' selected':''), onClick:()=>setMatIdx(MATERIALS.length)},
            h('div', {className:'mat-accent', style:{background:'#64748b'}}),
            h('div', {className:'mat-name'}, 'Custom Material'),
            h('div', {className:'mat-sub'}, 'User-defined properties'),
          )
        ),
        isCustomMat && h('div', null,
          h('div', {className:'divider'}),
          h(NumField, {label:'Mobility \u03bc', value:customMat.mu, unit:'cm\u00b2/Vs',
            onChange:v=>setCustomMat({...customMat, mu:v})}),
          h(NumField, {label:'Carrier density n', value:customMat.n, unit:'m\u207b\u00b2',
            onChange:v=>setCustomMat({...customMat, n:v})}),
          h('div', {className:'input-row'},
            h('label', null, 'Dimensionality'),
            h('div', {className:'mode-tabs', style:{width:'120px'}},
              h('button', {className:'mode-tab'+(customMat.dim==='2D'?' active':''), onClick:()=>setCustomMat({...customMat, dim:'2D'})}, '2D'),
              h('button', {className:'mode-tab'+(customMat.dim==='3D'?' active':''), onClick:()=>setCustomMat({...customMat, dim:'3D'})}, '3D'),
            )
          ),
        ),
        h('div', {className:'divider'}),
        h('div', {style:{fontSize:'10px',color:'var(--muted)',marginBottom:'4px'}}, 'Computed Properties'),
        h('table', {className:'props-table'},
          h('tbody', null,
            h('tr',null, h('td',null,'R\u2095 (Hall coeff.)'), h('td',{className:'computed'}, fmtSci(mp.RH)+' m'+(mat.dim==='2D'?'\u00b2':'\u00b3')+'/C')),
            h('tr',null, h('td',null,'\u03c3 (conductivity)'), h('td',{className:'computed'}, fmtSci(mp.sigma)+' S/m')),
            h('tr',null, h('td',null,'|S\u1d62| (sensitivity)'), h('td',{className:'computed'}, fmtSci(mp.SI)+' V/AT')),
            h('tr',null, h('td',null,'R\u2095\u00b7\u03c3 product'), h('td',{className:'computed'}, fmtSci(mp.RH*mp.sigma))),
          )
        ),
        h('div', {className:'eq'}, 'R\u2095 = 1/(n\u00b7e) = '+fmtSci(mp.RH)+' | \u03c3 = n\u00b7e\u00b7\u03bc = '+fmtSci(mp.sigma)+' S/m'),
        !isCustomMat && h('div',{className:'note'}, mat.desc+' \u2014 '+mat.ref),
      ),

      // ─── Card 2: Sensor Geometry ───
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--primary)'}}), 'Sensor Geometry'),
        h('div', {className:'mode-tabs', style:{marginBottom:'10px'}},
          h('button', {className:'mode-tab'+(sensMode==='preset'?' active':''), onClick:()=>setSensMode('preset')}, 'Presets'),
          h('button', {className:'mode-tab'+(sensMode==='custom'?' active':''), onClick:()=>setSensMode('custom')}, 'Custom'),
        ),
        sensMode === 'preset'
          ? h('div', {className:'preset-row'}, SENSOR_PRESETS.map((s, i) =>
              h('button', {key:i, className:'preset-btn'+(sensIdx===i?' active':''), onClick:()=>setSensIdx(i)},
                'Design '+s.name+' ('+s.label+')')
            ))
          : h('div', null,
              h(NumField, {label:'Sensor side w', value:+(customSensor.size*1e6).toFixed(1), unit:'\u00b5m',
                onChange:v=>setCustomSensor({...customSensor, size:v*1e-6})}),
              h(NumField, {label:'Thickness t', value:+(customSensor.t*1e6).toFixed(2), unit:'\u00b5m',
                onChange:v=>setCustomSensor({...customSensor, t:v*1e-6})}),
            ),
        h('div', {className:'divider'}),
        h('table', {className:'props-table'},
          h('tbody', null,
            h('tr',null, h('td',null,'Active area'), h('td',null, (activeSensor.size*1e6).toFixed(1)+' \u00d7 '+(activeSensor.size*1e6).toFixed(1)+' \u00b5m\u00b2')),
            h('tr',null, h('td',null,'Thickness'), h('td',null, (activeSensor.t*1e6).toFixed(2)+' \u00b5m')),
          )
        ),

        // Channel
        h('div', {className:'divider'}),
        h('div', {style:{fontSize:'10px',color:'var(--muted)',fontWeight:600,marginBottom:'6px',textTransform:'uppercase',letterSpacing:'1px'}}, 'Microfluidic Channel'),
        h(NumField, {label:'Channel height', value:chH, unit:'\u00b5m', onChange:setChH}),
        h(NumField, {label:'Flow velocity v\u0304', value:flowVel, unit:'mm/s', onChange:setFlowVel}),
        h(NumField, {label:'Applied field B\u2080', value:B0, unit:'mT', onChange:setB0}),
      ),

      // ─── Card 3: Bead Configuration ───
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--bead)'}}), 'Magnetic Bead'),
        h('div', {className:'mode-tabs', style:{marginBottom:'10px'}},
          h('button', {className:'mode-tab'+(beadMode==='preset'?' active':''), onClick:()=>setBeadMode('preset')}, 'Library'),
          h('button', {className:'mode-tab'+(beadMode==='custom'?' active':''), onClick:()=>setBeadMode('custom')}, 'Custom'),
        ),
        beadMode === 'preset'
          ? h('div', {className:'bead-grid'}, BEAD_LIBRARY.map((b, i) =>
              h('div', {key:b.id, className:'bead-card'+(beadIdx===i?' selected':''), onClick:()=>setBeadIdx(i)},
                h('div', {className:'bead-name'}, b.label),
                h('div', {className:'bead-sub'}, b.name),
              )
            ))
          : h('div', null,
              h(NumField, {label:'Diameter', value:+(customBead.d*1e6).toFixed(2), unit:'\u00b5m',
                onChange:v=>setCustomBead({...customBead, d:v*1e-6})}),
              h(NumField, {label:'Relative perm. \u03bc\u1d63', value:customBead.mu_r, unit:'',
                onChange:v=>setCustomBead({...customBead, mu_r:v})}),
            ),
        h('div', {className:'divider'}),
        h('div', {style:{fontSize:'10px',color:'var(--muted)',marginBottom:'4px'}}, 'Computed at B\u2080 = '+B0+' mT'),
        h('table', {className:'props-table'},
          h('tbody', null,
            h('tr',null, h('td',null,'\u03c7\u2091\u1da0\u1da0'), h('td',{className:'computed'}, chi.toFixed(3))),
            h('tr',null, h('td',null,'Moment m'), h('td',{className:'computed'}, fmtSci(mom)+' A\u00b7m\u00b2')),
            h('tr',null, h('td',null,'Peak \u27e8B\u1dbb\u27e9'), h('td',{className:'computed'}, fmtSci(peakBz)+' T')),
            h('tr',null, h('td',null,'Est. \u0394V\u2095 (5V bias)'), h('td',{className:'computed'}, (peakVH*1e3).toFixed(3)+' mV')),
          )
        ),
        h('div', {className:'eq'}, '\u03c7\u2091\u1da0\u1da0 = 3(\u03bc\u1d63\u22121)/(\u03bc\u1d63+2) | m = V\u1d47\u2091\u2090\u1d48\u00b7\u03c7\u2091\u1da0\u1da0\u00b7B\u2080/\u03bc\u2080'),
      ),

      // ─── Card 4: Physics Summary ───
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--signal)'}}), 'System Summary'),
        h('table', {className:'props-table'},
          h('tbody', null,
            h('tr',null, h('td',null,'Material'), h('td',null, isCustomMat ? 'Custom' : mat.name)),
            h('tr',null, h('td',null,'Sensor'), h('td',null, (activeSensor.size*1e6).toFixed(1)+' \u00d7 '+(activeSensor.size*1e6).toFixed(1)+' \u00b5m')),
            h('tr',null, h('td',null,'Bead'), h('td',null, beadMode==='custom' ? (customBead.d*1e6).toFixed(1)+' \u00b5m (custom)' : activeBead.name)),
            h('tr',null, h('td',null,'B\u2080'), h('td',null, B0+' mT')),
            h('tr',null, h('td',null,'R\u2095'), h('td',{className:'computed'}, fmtSci(mp.RH))),
            h('tr',null, h('td',null,'\u03c3'), h('td',{className:'computed'}, fmtSci(mp.sigma)+' S/m')),
            h('tr',null, h('td',null,'|S\u1d62|'), h('td',{className:'computed'}, fmtSci(mp.SI)+' V/AT')),
            h('tr',null, h('td',null,'R\u2095\u00b7\u03c3'), h('td',{className:'computed'}, fmtSci(mp.RH*mp.sigma))),
            h('tr',null, h('td',null,'Bead moment m'), h('td',{className:'computed'}, fmtSci(mom)+' A\u00b7m\u00b2')),
            h('tr',null, h('td',null,'Peak \u0394V\u2095 (est.)'), h('td',{className:'computed', style:{color:'var(--signal)',fontWeight:600}}, (peakVH*1e3).toFixed(3)+' mV')),
          )
        ),
        h('div',{style:{marginTop:'16px'}}),
        h('button', {className:'apply-btn', onClick:goToSim}, '\u25B6  Open Simulator with This Configuration'),
      ),
    ),
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APPLICATION
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Navigation ──
  const [page, setPage] = useState('simulator');

  // ── Material state ──
  const [matIdx, setMatIdx] = useState(0); // Graphene default
  const [customMat, setCustomMat] = useState({mu:3000, n:5e15, dim:'2D'});

  // ── Sensor state ──
  const [sensMode, setSensMode] = useState('preset');
  const [sensIdx, setSensIdx] = useState(1);
  const [customSensor, setCustomSensor] = useState({size:10e-6, t:1e-6});

  // ── Bead state ──
  const [beadMode, setBeadMode] = useState('preset');
  const [beadIdx, setBeadIdx] = useState(3); // M-280 default
  const [customBead, setCustomBead] = useState({d:5e-6, mu_r:10});

  // ── Sim params ──
  const [vBias, setVBias] = useState(5);
  const [B0, setB0] = useState(100);
  const [chH, setChH] = useState(50);
  const [flowVel, setFlowVel] = useState(1.0);
  const [nBeads, setNBeads] = useState(10);
  const [heightMode, setHeightMode] = useState('fixed');
  const [fixedHeight, setFixedHeight] = useState(3);
  const [minHeight, setMinHeight] = useState(2);
  const [maxHeight, setMaxHeight] = useState(10);
  const [threshold, setThreshold] = useState(1);
  const [simState, setSimState] = useState('idle');
  const [speed, setSpeed] = useState(5);
  const [, forceUpdate] = useState(0);

  // ── Active config ──
  const isCustomMat = matIdx >= MATERIALS.length;
  const activeMat = isCustomMat ? customMat : MATERIALS[matIdx];
  const mp = useMemo(() => computeMatProps(activeMat), [activeMat.mu, activeMat.n, activeMat.dim]);
  const sensor = sensMode === 'custom' ? customSensor : SENSOR_PRESETS[sensIdx];
  const bead = beadMode === 'custom' ? customBead : BEAD_LIBRARY[beadIdx];

  // ── Derived physics ──
  const chH_m = chH * 1e-6;
  const chW_m = sensor.size;
  const B0_T = B0 * 1e-3;
  const r_bead = bead.d / 2;
  const vAvg = flowVel * 1e-3;
  const mom = beadMoment(r_bead, bead.mu_r, B0_T);
  const activeRH = mp.RH;
  const activeSigma = mp.sigma;

  const visLen = Math.max(vAvg * 5, sensor.size * 25, 500e-6);
  const beadSpacing = Math.max(sensor.size * 6, visLen / (nBeads + 2));
  const SCENE_LEN = 30, SCENE_H = 4, SCENE_W = 3;
  const scaleX = SCENE_LEN / visLen, scaleY = SCENE_H / chH_m, scaleZ = SCENE_W / chW_m;
  const rScene = Math.max(0.12, r_bead * scaleY * 1.3);
  const Q_uLmin = vAvg * chW_m * chH_m * 60 * 1e6;

  // ── Refs ──
  const sceneRef = useRef(null), sceneContRef = useRef(null);
  const traceRef = useRef(null), traceContRef = useRef(null);
  const simRef = useRef({beads:[], signalBuf:[], time:0, peakSignal:0, batchDone:false, pulseData:[]});

  // ── Init 3D ──
  useEffect(() => {
    if (!sceneContRef.current || page !== 'simulator') return;
    if (sceneRef.current) return; // already initialized
    const sc = new FluidScene(sceneContRef.current);
    sceneRef.current = sc;
    return () => { sc.dispose(); sceneRef.current = null; };
  }, [page]);

  // ── Update geometry ──
  useEffect(() => {
    const sc = sceneRef.current; if (!sc) return;
    sc.buildChannel(SCENE_LEN, SCENE_H, SCENE_W);
    sc.buildSensor(SCENE_W, 0.15, SCENE_W);
  }, [sensIdx, sensMode, customSensor.size, chH, page]);

  // ── Batch control ──
  function startBatch() {
    const sim = simRef.current;
    sim.beads = []; sim.signalBuf = []; sim.time = 0;
    sim.peakSignal = 0; sim.batchDone = false; sim.pulseData = [];
    for (let i = 0; i < nBeads; i++) {
      const startX = -visLen/2 - r_bead*2 - i * beadSpacing;
      let y = heightMode === 'fixed' ? fixedHeight * 1e-6 : (minHeight + Math.random() * (maxHeight - minHeight)) * 1e-6;
      y = Math.max(y, r_bead + 0.1e-6);
      const z = (Math.random() - 0.5) * chW_m * 0.4;
      sim.beads.push({id:i+1, x:startX, y, z, active:true, passed:false, detected:false, peakDVH:0, currentDVH:0, height_um:y*1e6});
    }
    setSimState('running');
  }

  function resetSim() {
    const sim = simRef.current;
    sim.beads = []; sim.signalBuf = []; sim.time = 0;
    sim.peakSignal = 0; sim.batchDone = false; sim.pulseData = [];
    setSimState('idle'); forceUpdate(n => n + 1);
  }

  // ── Animation loop ──
  useEffect(() => {
    if (page !== 'simulator') return;
    let raf, lastT = performance.now();
    const sim = simRef.current;

    function tick(now) {
      const rawDt = (now - lastT) / 1000; lastT = now;
      const dt = Math.min(rawDt, 0.05) * (simState === 'running' ? speed : 0);

      if (simState === 'running') {
        let anyActive = false;
        const detZone = sensor.size * 10;
        const noiseRMS = 0.15e-3 * vBias;
        const maxV = heightMode === 'fixed' ? vAvg : 1.5 * vAvg;
        const frameDx = maxV * dt;
        const maxStep = sensor.size * 0.4;
        const nSub = Math.max(1, Math.ceil(frameDx / maxStep));
        const subDt = dt / nSub;

        for (let step = 0; step < nSub; step++) {
          for (const b of sim.beads) {
            if (!b.active) continue;
            const v = heightMode === 'fixed' ? vAvg : flowVelocity(b.y, chH_m, vAvg);
            b.x += v * subDt;
            if (heightMode !== 'fixed') b.y = Math.max(r_bead + 0.2e-6, b.y - 0.3e-6 * subDt);
          }
          let subTotal = 0;
          for (const b of sim.beads) {
            if (!b.active) continue;
            if (Math.abs(b.x) < detZone) {
              const Bz = volumeAvgBz(mom, b.x, b.z, b.y, sensor.size, sensor.t, 6, 1);
              const dvh = Math.abs(activeRH * activeSigma * Bz * vBias);
              b.currentDVH = dvh;
              if (dvh > b.peakDVH) b.peakDVH = dvh;
              if (!b.detected && dvh * 1000 > threshold) b.detected = true;
              subTotal += dvh;
            } else { b.currentDVH = 0; }
          }
          const noise = (Math.random() - 0.5) * 2 * noiseRMS;
          const tSub = sim.time + (step + 1) * subDt;
          sim.signalBuf.push({t:tSub, v:subTotal*1000, vn:(subTotal+noise)*1000});
          if (subTotal*1000 > sim.peakSignal) sim.peakSignal = subTotal*1000;
        }
        while (sim.signalBuf.length > 3000) sim.signalBuf.shift();
        sim.time += dt;
        for (const b of sim.beads) {
          if (!b.active) continue;
          if (b.x > visLen/2 + r_bead * 4) { b.active = false; b.passed = true; }
          else anyActive = true;
        }
        if (!anyActive && sim.beads.length > 0) {
          sim.batchDone = true;
          sim.pulseData = sim.beads.map(b => ({id:b.id, peakDVH:b.peakDVH*1000, detected:b.detected, height_um:b.height_um}));
          setSimState('done');
        }
        forceUpdate(n => n + 1);
      }

      const sc = sceneRef.current;
      if (sc) {
        const positions = sim.beads.map(b => {
          if (!b.active) return null;
          return {sx:b.x*scaleX, sy:b.y*scaleY, sz:b.z*scaleZ, detected:b.detected, glow:Math.min(b.currentDVH*1000/20,1)};
        });
        sc.updateBeads(positions, rScene);
        const maxSig = sim.beads.reduce((mx,b)=>Math.max(mx,b.currentDVH||0),0);
        sc.setSensorGlow(Math.min(maxSig*1000/10,1));
        sc.render();
      }
      drawTrace();
      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [page, simState, speed, chH_m, chW_m, vAvg, mom, r_bead, sensor.size, sensor.t,
      vBias, threshold, visLen, scaleX, scaleY, scaleZ, rScene, nBeads, beadSpacing, heightMode, activeRH, activeSigma]);

  // ── Trace drawing ──
  function drawTrace() {
    const canvas = traceRef.current, cont = traceContRef.current;
    if (!canvas || !cont) return;
    const W = cont.clientWidth, H = cont.clientHeight;
    if (canvas.width !== W*2 || canvas.height !== H*2) { canvas.width = W*2; canvas.height = H*2; }
    const ctx = canvas.getContext('2d'); ctx.setTransform(2, 0, 0, 2, 0, 0); ctx.clearRect(0, 0, W, H);
    const sim = simRef.current;
    const pad = {top:22, bottom:22, left:52, right:15};
    const dW = W - pad.left - pad.right, dH = H - pad.top - pad.bottom;
    const maxV = Math.max(threshold * 3, sim.peakSignal * 1.3, 5);
    const buf = sim.signalBuf;
    ctx.strokeStyle = '#1a2540'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 5; i++) {
      const py = pad.top + dH * (1 - i/5);
      ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(pad.left + dW, py); ctx.stroke();
      ctx.fillStyle = '#475569'; ctx.font = '9px JetBrains Mono'; ctx.textAlign = 'right';
      const val = (i/5) * maxV;
      ctx.fillText(val < 10 ? val.toFixed(1) : val.toFixed(0), pad.left - 4, py + 3);
    }
    const thY = pad.top + dH * (1 - threshold / maxV);
    if (thY > pad.top && thY < pad.top + dH) {
      ctx.strokeStyle = 'rgba(239,68,68,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(pad.left, thY); ctx.lineTo(pad.left + dW, thY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ef4444'; ctx.font = '8px DM Sans'; ctx.textAlign = 'left';
      ctx.fillText('threshold', pad.left + 3, thY - 3);
    }
    if (buf.length > 1) {
      ctx.strokeStyle = 'rgba(34,197,94,0.15)'; ctx.lineWidth = 1; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(Math.abs(buf[i].vn) / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(buf[i].v / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.strokeStyle = 'rgba(34,197,94,0.07)'; ctx.lineWidth = 7; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(buf[i].v / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.save(); ctx.translate(10, pad.top + dH/2); ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#64748b'; ctx.font = '9px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText('\u0394V_H (mV)', 0, 0); ctx.restore();
    ctx.fillStyle = '#475569'; ctx.font = '9px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText('Time (s)', pad.left + dW/2, pad.top + dH + 16);
    if (buf.length > 1) {
      const tMax = buf[buf.length-1].t, tMin = buf[0].t;
      ctx.fillStyle = '#384860'; ctx.font = '8px JetBrains Mono'; ctx.textAlign = 'center';
      for (let i = 0; i <= 4; i++) {
        const t = tMin + (tMax - tMin) * i / 4;
        ctx.fillText(t.toFixed(1), pad.left + dW * (i / 4), pad.top + dH + 8);
      }
    }
    if (simState === 'running') {
      const nPassed = sim.beads.filter(b => b.passed).length;
      ctx.fillStyle = '#06b6d4'; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
      ctx.fillText(nPassed + '/' + sim.beads.length + ' passed', pad.left + dW - 2, pad.top - 6);
    }
    if (simState === 'done') {
      ctx.fillStyle = '#06b6d4'; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
      ctx.fillText('Batch complete \u2014 ' + sim.beads.length + ' beads', pad.left + dW - 2, pad.top - 6);
    }
  }

  // ── Metrics ──
  const sim = simRef.current;
  const nDetected = sim.beads.filter(b => b.detected).length;
  const pulses = sim.pulseData;
  const detPulses = pulses.filter(p => p.detected);
  const meanPeak = detPulses.length > 0 ? detPulses.reduce((s,p) => s + p.peakDVH, 0) / detPulses.length : 0;
  const stdPeak = detPulses.length > 1 ? Math.sqrt(detPulses.reduce((s,p) => s + (p.peakDVH - meanPeak)**2, 0) / (detPulses.length - 1)) : 0;
  const cvPeak = meanPeak > 0 ? (stdPeak / meanPeak * 100) : 0;

  return h('div', {className:'app' + (page === 'designer' ? ' designer-mode' : '')},
    // ── Header ──
    h('div', {className:'header'},
      h('div', {className:'header-brand'},
        h('h1', null, h('span', {className:'brand'}, '\u00B5Flow'), ' 3D Microfluidic Hall Sensor'),
        h('span', {className:'sub'}, 'Govindaraju & Hassan (2025)'),
      ),
      h('div', {className:'nav-tabs'},
        h('button', {className:'nav-tab'+(page==='simulator'?' active':''), onClick:()=>setPage('simulator')}, '\u25b6 Simulator'),
        h('button', {className:'nav-tab'+(page==='designer'?' active':''), onClick:()=>setPage('designer')}, '\u2699 Designer'),
      ),
      page === 'simulator' && h('div', {className:'header-metrics'},
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Material'),
          h('div', {className:'metric-value', style:{color:isCustomMat?'#94a3b8':activeMat.color}}, isCustomMat?'Custom':activeMat.id==='graphene-hbn'?'Gr/hBN':activeMat.name.split(' ')[0])
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Status'),
          h('span', {className:'status-badge '+simState}, simState === 'idle' ? 'IDLE' : simState === 'running' ? 'RUNNING' : 'COMPLETE')
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Detected'),
          h('div', {className:'metric-value g'}, nDetected + '/' + nBeads)
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Peak \u0394V\u2095'),
          h('div', {className:'metric-value g'}, sim.peakSignal.toFixed(2) + ' mV')
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'R\u2095\u00b7\u03c3'),
          h('div', {className:'metric-value'}, fmtSci(activeRH * activeSigma, 2))
        ),
      ),
    ),

    // ── Page content ──
    page === 'designer'
      ? h(DesignerPage, {matIdx, setMatIdx, customMat, setCustomMat,
          beadIdx, setBeadIdx, beadMode, setBeadMode, customBead, setCustomBead,
          sensMode, setSensMode, sensIdx, setSensIdx, customSensor, setCustomSensor,
          chH, setChH, flowVel, setFlowVel, B0, setB0,
          goToSim: () => setPage('simulator')})
      : h(React.Fragment, null,
        // ── Sidebar ──
        h('div', {className:'sidebar'},
          // Material indicator
          h('div', {className:'group'},
            h('div', {className:'group-title mat'}, 'Sensor Material'),
            h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
              h('span', {style:{fontSize:'12px',fontWeight:600,color:isCustomMat?'#94a3b8':activeMat.color}},
                isCustomMat ? 'Custom' : activeMat.name),
              h('button', {className:'preset-btn', style:{fontSize:'8px'}, onClick:()=>setPage('designer')}, 'Change \u2192'),
            ),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'R\u2095 = '), fmtSci(activeRH)),
              h('div', null, h('b',null,'\u03c3 = '), fmtSci(activeSigma), ' S/m'),
              h('div', null, h('b',null,'|S\u1d62| = '), fmtSci(mp.SI), ' V/AT'),
            ),
          ),

          // Sensor geometry
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Sensor Geometry'),
            h('div', {className:'mode-tabs', style:{marginBottom:'4px'}},
              h('button', {className:'mode-tab'+(sensMode==='preset'?' active':''), disabled:simState==='running', onClick:()=>setSensMode('preset')}, 'Preset'),
              h('button', {className:'mode-tab'+(sensMode==='custom'?' active':''), disabled:simState==='running', onClick:()=>setSensMode('custom')}, 'Custom'),
            ),
            sensMode === 'preset'
              ? h('div', {className:'preset-row'}, SENSOR_PRESETS.map((s, i) =>
                  h('button', {key:i, className:'preset-btn'+(sensIdx===i?' active':''),
                    disabled:simState==='running', onClick:()=>setSensIdx(i)}, s.name+' ('+s.label+')')
                ))
              : h('div', null,
                  h(NumField, {label:'Side w', value:+(customSensor.size*1e6).toFixed(1), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomSensor({...customSensor, size:v*1e-6})}),
                  h(NumField, {label:'Thickness t', value:+(customSensor.t*1e6).toFixed(2), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomSensor({...customSensor, t:v*1e-6})}),
                ),
            h(Slider, {label:'Bias Voltage', value:vBias, min:1, max:10, step:0.5, unit:' V', onChange:setVBias, disabled:simState==='running'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'Area: '), (sensor.size*1e6).toFixed(1), '\u00d7', (sensor.size*1e6).toFixed(1), ' \u00b5m\u00b2'),
            ),
          ),

          // Channel
          h('div', {className:'group'},
            h('div', {className:'group-title ch'}, 'Microfluidic Channel'),
            h(Slider, {label:'Height', value:chH, min:10, max:200, step:5, unit:' \u00b5m', onChange:setChH, disabled:simState==='running'}),
            h(Slider, {label:'Flow velocity v\u0304', value:flowVel, min:0.1, max:20, step:0.1, unit:' mm/s', onChange:setFlowVel, disabled:simState==='running'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'Q: '), Q_uLmin < 0.001 ? Q_uLmin.toExponential(2) : Q_uLmin.toFixed(4), ' \u00b5L/min'),
            ),
          ),

          // Bead
          h('div', {className:'group'},
            h('div', {className:'group-title bead'}, 'Magnetic Bead'),
            h('div', {className:'mode-tabs', style:{marginBottom:'4px'}},
              h('button', {className:'mode-tab'+(beadMode==='preset'?' active':''), disabled:simState==='running', onClick:()=>setBeadMode('preset')}, 'Library'),
              h('button', {className:'mode-tab'+(beadMode==='custom'?' active':''), disabled:simState==='running', onClick:()=>setBeadMode('custom')}, 'Custom'),
            ),
            beadMode === 'preset'
              ? h('div', {className:'preset-row'}, BEAD_LIBRARY.map((p, i) =>
                  h('button', {key:p.id, className:'preset-btn'+(beadIdx===i?' active':''),
                    disabled:simState==='running', onClick:()=>setBeadIdx(i)}, p.label)
                ))
              : h('div', null,
                  h(NumField, {label:'Diameter', value:+(customBead.d*1e6).toFixed(2), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomBead({...customBead, d:v*1e-6})}),
                  h(NumField, {label:'\u03bc\u1d63', value:customBead.mu_r, unit:'', disabled:simState==='running',
                    onChange:v=>setCustomBead({...customBead, mu_r:v})}),
                ),
            h(Slider, {label:'Batch size N', value:nBeads, min:1, max:50, step:1, unit:'', onChange:setNBeads, disabled:simState==='running'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'\u03c7\u2091\u1da0\u1da0 = '), (3*(bead.mu_r-1)/(bead.mu_r+2)).toFixed(3)),
              h('div', null, h('b',null,'m = '), fmtSci(mom), ' A\u00b7m\u00b2'),
            ),
          ),

          // Height mode
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Bead\u2013Sensor Distance'),
            h('div', {className:'mode-tabs'},
              h('button', {className:'mode-tab'+(heightMode==='fixed'?' active':''), disabled:simState==='running', onClick:()=>setHeightMode('fixed')}, 'Fixed r'),
              h('button', {className:'mode-tab'+(heightMode==='range'?' active':''), disabled:simState==='running', onClick:()=>setHeightMode('range')}, 'Random'),
            ),
            heightMode === 'fixed'
              ? h(Slider, {label:'r', value:fixedHeight, min:0.5, max:30, step:0.5, unit:' \u00b5m', onChange:setFixedHeight, disabled:simState==='running'})
              : h('div', null,
                  h(Slider, {label:'Min r', value:minHeight, min:0.5, max:20, step:0.5, unit:' \u00b5m', onChange:setMinHeight, disabled:simState==='running'}),
                  h(Slider, {label:'Max r', value:maxHeight, min:1, max:40, step:0.5, unit:' \u00b5m', onChange:setMaxHeight, disabled:simState==='running'}),
                ),
          ),

          // CHMA
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Halbach Array'),
            h(Slider, {label:'B\u2080 at sensor', value:B0, min:10, max:500, step:10, unit:' mT', onChange:setB0, disabled:simState==='running'}),
          ),

          // Detection threshold
          h('div', {className:'group'},
            h('div', {className:'group-title det'}, 'Detection'),
            h(Slider, {label:'\u0394V\u2095 threshold', value:threshold, min:0.1, max:100, step:0.1, unit:' mV', onChange:setThreshold}),
          ),

          // Batch results
          simState === 'done' && h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Batch Results'),
            h('div', {className:'results-box'},
              h('div', {className:'rtitle'}, 'Pulse Analysis \u2014 ' + nBeads + ' beads'),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Detection'), h('span',{className:'val '+(nDetected===nBeads?'good':'warn')}, nDetected+'/'+nBeads+' ('+(nDetected/nBeads*100).toFixed(0)+'%)')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Mean peak'), h('span',{className:'val'}, meanPeak.toFixed(3)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Std dev'), h('span',{className:'val'}, stdPeak.toFixed(4)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'CV'), h('span',{className:'val '+(cvPeak<5?'good':cvPeak<15?'warn':'r')}, cvPeak.toFixed(1)+'%')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Max peak'), h('span',{className:'val good'}, sim.peakSignal.toFixed(3)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Material'), h('span',{className:'val'}, isCustomMat?'Custom':activeMat.name)),
            ),
            pulses.length > 0 && pulses.length <= 50 && h('div', {style:{maxHeight:'200px',overflowY:'auto',marginTop:'4px'}},
              h('table', {className:'pulse-table'},
                h('thead', null, h('tr', null, h('th',null,'#'), h('th',null,'r (\u00b5m)'), h('th',null,'Peak (mV)'), h('th',null,''))),
                h('tbody', null, pulses.map(p =>
                  h('tr', {key:p.id}, h('td',null,p.id), h('td',null,p.height_um.toFixed(1)),
                    h('td',null,p.peakDVH.toFixed(3)),
                    h('td',{className:p.detected?'det':'miss'}, p.detected?'\u2713':'\u2717'))
                ))
              )
            ),
          ),
        ),

        // ── 3D Scene ──
        h('div', {className:'scene-container', ref:sceneContRef},
          h('div', {className:'ctrl-bar'},
            simState === 'idle' && h('button', {className:'ctrl-btn run', onClick:startBatch}, '\u25B6 Run Batch ('+nBeads+' beads)'),
            simState === 'running' && h('button', {className:'ctrl-btn', onClick:()=>setSpeed(s=>s===1?2:s===2?5:s===5?10:1)}, 'Speed '+speed+'\u00D7'),
            (simState === 'running' || simState === 'done') && h('button', {className:'ctrl-btn danger', onClick:resetSim}, 'Reset'),
            simState === 'done' && h('button', {className:'ctrl-btn run', onClick:startBatch}, '\u21BB Re-run'),
          ),
        ),

        // ── Signal Trace ──
        h('div', {className:'trace-panel', ref:traceContRef},
          h('div', {className:'trace-label'}, 'Real-time Hall Voltage \u2014 \u0394V\u2095(t)'),
          h('canvas', {ref:traceRef}),
        ),
      ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
