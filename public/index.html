// 2D AXISYMMETRIC FEM MAGNETOSTATIC SOLVER
// Solves: (1/r)∂/∂r(r·μᵣ·∂φ/∂r) + ∂/∂z(μᵣ·∂φ/∂z) = 0
// Linear triangular elements, PCG solver, adaptive structured mesh
// ══════════════════════════════════════════════════════════════════════════════

function femGridLines(lo, hi, n, features) {
  const nS = 500, len = hi - lo;
  const den = new Float64Array(nS);
  for (let i = 0; i < nS; i++) {
    const x = lo + len * (i + 0.5) / nS;
    let d = 1;
    for (const f of features) d += f.w / (1 + ((x - f.p) / f.s) ** 2);
    den[i] = d;
  }
  const cum = new Float64Array(nS + 1);
  for (let i = 0; i < nS; i++) cum[i + 1] = cum[i] + den[i];
  const tot = cum[nS];
  const lines = [lo];
  for (let j = 1; j < n; j++) {
    const tgt = tot * j / n;
    let a = 0, b = nS;
    while (b - a > 1) { const m = (a + b) >> 1; cum[m] < tgt ? a = m : b = m; }
    const frac = (tgt - cum[a]) / (cum[b] - cum[a] || 1);
    lines.push(lo + (a + frac) / nS * len);
  }
  lines.push(hi);
  return lines;
}

function femCreateMesh(beadR, beadH, sensHW, sensT, muR, nG) {
  const domR = Math.max(15 * beadR, 3 * sensHW, 8 * beadH);
  const domZlo = -3 * sensT, domZhi = Math.max(domR * 0.8, beadH + 12 * beadR);
  const rFeat = [{p:0,s:beadR*0.25,w:5},{p:beadR,s:beadR*0.3,w:12},{p:sensHW,s:sensHW*0.3,w:5}];
  const zFeat = [{p:0,s:sensT*0.4,w:8},{p:beadH,s:beadR*0.3,w:12},
                 {p:beadH+beadR,s:beadR*0.2,w:10},{p:beadH-beadR,s:beadR*0.2,w:10}];
  const rs = femGridLines(0, domR, nG, rFeat);
  const zs = femGridLines(domZlo, domZhi, nG, zFeat);
  const nr = rs.length, nz = zs.length, nodes = [];
  for (let iz = 0; iz < nz; iz++)
    for (let ir = 0; ir < nr; ir++) nodes.push({r:rs[ir], z:zs[iz]});
  const idx = (ir, iz) => iz * nr + ir;
  const elements = [];
  for (let iz = 0; iz < nz - 1; iz++)
    for (let ir = 0; ir < nr - 1; ir++) {
      const n00=idx(ir,iz), n10=idx(ir+1,iz), n01=idx(ir,iz+1), n11=idx(ir+1,iz+1);
      elements.push({n:[n00,n10,n11]}); elements.push({n:[n00,n11,n01]});
    }
  for (const el of elements) {
    const cr=(nodes[el.n[0]].r+nodes[el.n[1]].r+nodes[el.n[2]].r)/3;
    const cz=(nodes[el.n[0]].z+nodes[el.n[1]].z+nodes[el.n[2]].z)/3;
    const dist=Math.sqrt(cr*cr+(cz-beadH)**2);
    el.muR = dist < beadR ? muR : 1.0;
    el.inBead = dist < beadR;
    el.cr = cr; el.cz = cz;
  }
  const bc = new Set();
  for (let ir=0;ir<nr;ir++){bc.add(idx(ir,0));bc.add(idx(ir,nz-1));}
  for (let iz=0;iz<nz;iz++) bc.add(idx(nr-1,iz));
  return {nodes, elements, bc, nr, nz, domR, domZlo, domZhi, beadR, beadH, sensHW, sensT};
}

function femSolve(mesh, B0_T, tol, maxIter) {
  const t0 = performance.now();
  const H0 = B0_T / MU0, N = mesh.nodes.length;
  const rows = new Array(N);
  for (let i = 0; i < N; i++) rows[i] = new Map();
  const rhs = new Float64Array(N);
  function addK(i,j,v){rows[i].set(j,(rows[i].get(j)||0)+v);}

  for (const el of mesh.elements) {
    const [ni,nj,nk] = el.n;
    const ri=mesh.nodes[ni].r,zi=mesh.nodes[ni].z;
    const rj=mesh.nodes[nj].r,zj=mesh.nodes[nj].z;
    const rk=mesh.nodes[nk].r,zk=mesh.nodes[nk].z;
    const D=(rj-ri)*(zk-zi)-(rk-ri)*(zj-zi);
    const A=Math.abs(D)/2;
    if(A<1e-50) continue;
    const br=[zj-zk,zk-zi,zi-zj], bz=[rk-rj,ri-rk,rj-ri];
    const rBar=Math.max((ri+rj+rk)/3, 1e-15);
    const c=el.muR*rBar/(4*A);
    const ln=[ni,nj,nk];
    for(let a=0;a<3;a++) for(let b=0;b<3;b++) addK(ln[a],ln[b],c*(br[a]*br[b]+bz[a]*bz[b]));
  }

  let maxD=0;
  for(let i=0;i<N;i++) maxD=Math.max(maxD,rows[i].get(i)||0);
  const pen=maxD*1e8;
  for(const di of mesh.bc){
    const g=H0*mesh.nodes[di].z;
    rows[di].clear(); rows[di].set(di,pen); rhs[di]=g*pen;
  }

  const phi=new Float64Array(N);
  for(let i=0;i<N;i++) phi[i]=H0*mesh.nodes[i].z;
  const dInv=new Float64Array(N);
  for(let i=0;i<N;i++) dInv[i]=1/(rows[i].get(i)||1);

  function mv(x,y){for(let i=0;i<N;i++){let s=0;for(const[j,v]of rows[i])s+=v*x[j];y[i]=s;}}
  const r=new Float64Array(N),z=new Float64Array(N),p=new Float64Array(N),Ap=new Float64Array(N);
  const res=[];
  mv(phi,Ap);
  for(let i=0;i<N;i++)r[i]=rhs[i]-Ap[i];
  for(let i=0;i<N;i++)z[i]=dInv[i]*r[i];
  p.set(z);
  let rz=0;for(let i=0;i<N;i++)rz+=r[i]*z[i];
  let iter=0;
  for(;iter<maxIter;iter++){
    mv(p,Ap);
    let pAp=0;for(let i=0;i<N;i++)pAp+=p[i]*Ap[i];
    const alpha=rz/(pAp||1e-30);
    for(let i=0;i<N;i++){phi[i]+=alpha*p[i];r[i]-=alpha*Ap[i];}
    let rn=0;for(let i=0;i<N;i++)rn+=r[i]*r[i];
    rn=Math.sqrt(rn); res.push(rn);
    if(rn<tol) break;
    for(let i=0;i<N;i++)z[i]=dInv[i]*r[i];
    let rzn=0;for(let i=0;i<N;i++)rzn+=r[i]*z[i];
    const beta=rzn/(rz||1e-30);
    for(let i=0;i<N;i++)p[i]=z[i]+beta*p[i];
    rz=rzn;
  }
  const solveTime = performance.now()-t0;
  return {phi,res,iter:iter+1,solveTime,N};
}

function femField(mesh, phi, B0_T) {
  const H0=B0_T/MU0;
  return mesh.elements.map(el=>{
    const [ni,nj,nk]=el.n;
    const ri=mesh.nodes[ni].r,zi=mesh.nodes[ni].z;
    const rj=mesh.nodes[nj].r,zj=mesh.nodes[nj].z;
    const rk=mesh.nodes[nk].r,zk=mesh.nodes[nk].z;
    const D=(rj-ri)*(zk-zi)-(rk-ri)*(zj-zi);
    if(Math.abs(D)<1e-50) return {Br:0,Bz:-B0_T,dBz:0};
    const dNdr=[(zj-zk)/D,(zk-zi)/D,(zi-zj)/D];
    const dNdz=[(rk-rj)/D,(ri-rk)/D,(rj-ri)/D];
    let dpdr=0,dpdz=0;
    for(let a=0;a<3;a++){dpdr+=dNdr[a]*phi[el.n[a]];dpdz+=dNdz[a]*phi[el.n[a]];}
    const Br=-MU0*el.muR*dpdr, Bz=-MU0*el.muR*dpdz;
    return {Br, Bz, dBz:Bz-(-B0_T)};
  });
}

function femSensorAvg(mesh, fd, sensHW) {
  let sw=0,sn=0;
  for(let i=0;i<mesh.elements.length;i++){
    const el=mesh.elements[i];
    if(el.cz>-mesh.sensT*1.5&&el.cz<mesh.sensT*0.5&&el.cr<sensHW){
      const [ni,nj,nk]=el.n;
      const ri=mesh.nodes[ni].r,zi=mesh.nodes[ni].z;
      const rj=mesh.nodes[nj].r,zj=mesh.nodes[nj].z;
      const rk=mesh.nodes[nk].r,zk=mesh.nodes[nk].z;
      const A=Math.abs((rj-ri)*(zk-zi)-(rk-ri)*(zj-zi))/2;
      const w=A*Math.max(el.cr,1e-15);
      sw+=fd[i].dBz*w; sn+=w;
    }
  }
  return sn>0?sw/sn:0;
}

function femAnalyticalSensorAvg(mom, sensHW, beadH, sensT, nR) {
  nR=nR||40;
  let sw=0,sn=0;
  for(let ir=0;ir<nR;ir++){
    const r_=(ir+0.5)/nR*sensHW;
    const Bz=(MU0/(4*Math.PI))*mom*(2*beadH*beadH-r_*r_)/Math.pow(r_*r_+beadH*beadH,2.5);
    const w=r_;
    sw+=Bz*w; sn+=w;
  }
  return sn>0?sw/sn:0;
}

function femDivColor(t) {
  // Diverging colormap: blue → near-black midpoint → red/amber
  // Perceptually uniform with sqrt scaling, dark-theme friendly
  t=Math.max(-1,Math.min(1,t));
  if(t>=0){
    const s=Math.sqrt(t);
    const r=Math.round(12+80*s+163*s*s);  // 12 → 255
    const g=Math.round(10+50*s+10*s*s);    // 10 → 70
    const b=Math.round(18+10*s-18*s*s);    // 18 → 10
    return `rgb(${r},${g},${b})`;
  } else {
    const s=Math.sqrt(-t);
    const r=Math.round(12+5*s-7*s*s);      // 12 → 10
    const g=Math.round(10+50*s+30*s*s);     // 10 → 90
    const b=Math.round(18+100*s+137*s*s);   // 18 → 255
    return `rgb(${r},${g},${b})`;
  }
}

function femFmtSI(val) {
  // Format a value with SI prefix for clean display
  const av=Math.abs(val);
  if(av===0) return '0';
  if(av>=1) return val.toFixed(1);
  if(av>=1e-3) return (val*1e3).toFixed(1)+'m';
  if(av>=1e-6) return (val*1e6).toFixed(1)+'\u00b5';
  if(av>=1e-9) return (val*1e9).toFixed(1)+'n';
  return val.toExponential(1);
}

function drawFEMField(canvas, mesh, fd, cfg) {
  const W=canvas.width/2, H=canvas.height/2;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(2,0,0,2,0,0);
  ctx.fillStyle='#060a14';ctx.fillRect(0,0,W,H);

  // Fixed readable font sizes
  const fs=13, tfs=11, sfs=10;
  const pad={top:38,right:80,bottom:48,left:56};
  const pW=W-pad.left-pad.right, pH=H-pad.top-pad.bottom;
  const rMax=mesh.domR, zMin=mesh.domZlo, zMax=mesh.domZhi;
  const toP=(r,z)=>[pad.left+(r+rMax)/(2*rMax)*pW, pad.top+(1-(z-zMin)/(zMax-zMin))*pH];

  // Find max |ΔBz| for color normalization
  let mxAbs=0;
  for(const f of fd) mxAbs=Math.max(mxAbs,Math.abs(f.dBz));
  if(mxAbs<1e-18) mxAbs=1;

  // Draw filled triangles (+ mirror) — skip in mesh-only mode
  if(!cfg.meshOnly){
    for(let i=0;i<mesh.elements.length;i++){
      const el=mesh.elements[i];
      const col=femDivColor(fd[i].dBz/mxAbs);
      const n0=mesh.nodes[el.n[0]],n1=mesh.nodes[el.n[1]],n2=mesh.nodes[el.n[2]];
      ctx.fillStyle=col;
      ctx.beginPath();
      let[px,py]=toP(n0.r,n0.z);ctx.moveTo(px,py);
      [px,py]=toP(n1.r,n1.z);ctx.lineTo(px,py);
      [px,py]=toP(n2.r,n2.z);ctx.lineTo(px,py);
      ctx.closePath();ctx.fill();
      ctx.beginPath();
      [px,py]=toP(-n0.r,n0.z);ctx.moveTo(px,py);
      [px,py]=toP(-n1.r,n1.z);ctx.lineTo(px,py);
      [px,py]=toP(-n2.r,n2.z);ctx.lineTo(px,py);
      ctx.closePath();ctx.fill();
    }
  }

  // Mesh wireframe overlay
  if(cfg.showMesh){
    // Brighter in mesh-only mode, subtle when overlaid on field
    const meshAlpha=cfg.meshOnly?0.35:0.12;
    // Color bead elements differently in mesh-only mode
    for(let i=0;i<mesh.elements.length;i++){
      const el=mesh.elements[i];
      const n0=mesh.nodes[el.n[0]],n1=mesh.nodes[el.n[1]],n2=mesh.nodes[el.n[2]];
      if(cfg.meshOnly){
        ctx.strokeStyle=el.inBead?'rgba(245,158,11,'+meshAlpha+')':'rgba(148,163,184,'+meshAlpha+')';
        // Light fill for bead region
        if(el.inBead){ctx.fillStyle='rgba(245,158,11,0.06)';} else {ctx.fillStyle='transparent';}
      } else {
        ctx.strokeStyle='rgba(148,163,184,'+meshAlpha+')';
      }
      ctx.lineWidth=0.5;ctx.setLineDash([]);
      // Right half
      ctx.beginPath();
      let[px,py]=toP(n0.r,n0.z);ctx.moveTo(px,py);
      [px,py]=toP(n1.r,n1.z);ctx.lineTo(px,py);
      [px,py]=toP(n2.r,n2.z);ctx.lineTo(px,py);
      ctx.closePath();ctx.stroke();
      if(cfg.meshOnly&&el.inBead)ctx.fill();
      // Mirror
      ctx.beginPath();
      [px,py]=toP(-n0.r,n0.z);ctx.moveTo(px,py);
      [px,py]=toP(-n1.r,n1.z);ctx.lineTo(px,py);
      [px,py]=toP(-n2.r,n2.z);ctx.lineTo(px,py);
      ctx.closePath();ctx.stroke();
      if(cfg.meshOnly&&el.inBead)ctx.fill();
    }
  }

  // Plot border
  ctx.strokeStyle='rgba(100,116,139,0.4)';ctx.lineWidth=1;
  ctx.strokeRect(pad.left,pad.top,pW,pH);

  // Bead outline (circle at bead center)
  const[bcx,bcy]=toP(0,mesh.beadH);
  const brPx=mesh.beadR/(2*rMax)*pW;
  ctx.strokeStyle='rgba(245,158,11,0.8)';ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(bcx,bcy,brPx,0,Math.PI*2);ctx.stroke();
  // Bead label
  ctx.fillStyle='rgba(245,158,11,0.85)';ctx.font=`${sfs}px "DM Sans"`;ctx.textAlign='left';
  ctx.fillText('bead',bcx+brPx+4,bcy-2);

  // Sensor rectangle
  const[sl,st]=toP(-mesh.sensHW,0),[sr,sb]=toP(mesh.sensHW,-mesh.sensT);
  ctx.strokeStyle='rgba(34,211,238,0.8)';ctx.lineWidth=1.5;
  ctx.strokeRect(sl,st,sr-sl,sb-st);
  // Sensor label
  ctx.fillStyle='rgba(34,211,238,0.8)';ctx.font=`${sfs}px "DM Sans"`;ctx.textAlign='left';
  ctx.fillText('sensor',sr+4,st+4);

  // Symmetry axis (dashed center line)
  const[axX,axTop]=toP(0,zMax),[_,axBot]=toP(0,zMin);
  ctx.strokeStyle='rgba(148,163,184,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(axX,axTop);ctx.lineTo(axX,axBot);ctx.stroke();
  ctx.setLineDash([]);

  // X-axis label
  ctx.fillStyle='#94a3b8';ctx.font=`${fs}px "DM Sans"`;ctx.textAlign='center';
  ctx.fillText('r (\u00b5m)',pad.left+pW/2,H-8);

  // Y-axis label
  ctx.save();ctx.translate(14,pad.top+pH/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('z (\u00b5m)',0,0);ctx.restore();

  // X ticks — nice round values
  ctx.font=`${tfs}px "JetBrains Mono"`;ctx.fillStyle='#94a3b8';ctx.textAlign='center';
  const rUm=rMax*1e6;
  const rStep=rUm>40?20:rUm>20?10:rUm>8?5:rUm>3?2:1;
  for(let rv=-Math.floor(rUm/rStep)*rStep;rv<=rUm;rv+=rStep){
    const rM=rv*1e-6;
    if(Math.abs(rM)>rMax*1.01) continue;
    const[tx,ty]=toP(rM,zMin);
    ctx.fillText(rv.toString(),tx,ty+tfs+5);
    ctx.strokeStyle='rgba(100,116,139,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx,ty+3);ctx.stroke();
  }

  // Z ticks — nice round values
  ctx.textAlign='right';
  const zUmMin=zMin*1e6, zUmMax=zMax*1e6, zSpanUm=zUmMax-zUmMin;
  const zStep=zSpanUm>80?20:zSpanUm>40?10:zSpanUm>16?5:zSpanUm>6?2:1;
  for(let zv=Math.ceil(zUmMin/zStep)*zStep;zv<=zUmMax;zv+=zStep){
    const zM=zv*1e-6;
    const[tx,ty]=toP(-rMax,zM);
    ctx.fillStyle='#94a3b8';ctx.fillText(zv.toString(),tx-5,ty+4);
    ctx.strokeStyle='rgba(100,116,139,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left-3,ty);ctx.lineTo(pad.left,ty);ctx.stroke();
  }

  // Title
  ctx.fillStyle='#e2e8f0';ctx.font=`600 ${fs+1}px "DM Sans"`;ctx.textAlign='center';
  ctx.fillText('\u0394Bz Perturbation Field (axisymmetric)',pad.left+pW/2,pad.top-16);

  // Color bar — vertical gradient with border
  const cbW=14,cbH=pH*0.7,cbX=W-pad.right+16,cbY=pad.top+(pH-cbH)/2;
  // Draw gradient
  for(let iy=0;iy<cbH;iy++){
    const t=1-2*iy/cbH;
    ctx.fillStyle=femDivColor(t);ctx.fillRect(cbX,cbY+iy,cbW,1.5);
  }
  // Color bar border
  ctx.strokeStyle='rgba(100,116,139,0.35)';ctx.lineWidth=1;
  ctx.strokeRect(cbX,cbY,cbW,cbH);
  // Center tick
  ctx.strokeStyle='rgba(148,163,184,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cbX+cbW,cbY+cbH/2);ctx.lineTo(cbX+cbW+3,cbY+cbH/2);ctx.stroke();

  // Color bar labels — use SI prefix for clean display
  ctx.font=`${sfs}px "JetBrains Mono"`;ctx.fillStyle='#94a3b8';ctx.textAlign='left';
  const cbLabel=femFmtSI(mxAbs);
  ctx.fillText('+'+cbLabel+'T',cbX+cbW+5,cbY+4);
  ctx.fillText('0',cbX+cbW+5,cbY+cbH/2+4);
  ctx.fillText('\u2212'+cbLabel+'T',cbX+cbW+5,cbY+cbH+4);
}

function drawFEMComparison(canvas, mesh, fd, mom, cfg) {
  const W=canvas.width/2, H=canvas.height/2;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(2,0,0,2,0,0);
  ctx.fillStyle='#0d1424';ctx.fillRect(0,0,W,H);

  // Font sizes — use fixed readable sizes, not chartFS which is tuned for wide charts
  const fs=13, tfs=11, lfs=10;
  const pad={top:36,right:28,bottom:48,left:72};
  const pW=W-pad.left-pad.right,pH=H-pad.top-pad.bottom;

  // Extract ΔBz vs r along sensor surface (z ≈ 0)
  const sensorEls=[];
  for(let i=0;i<mesh.elements.length;i++){
    const el=mesh.elements[i];
    if(Math.abs(el.cz)<mesh.sensT*2&&el.cr<mesh.domR*0.5){
      sensorEls.push({r:el.cr,dBz:fd[i].dBz});
    }
  }
  sensorEls.sort((a,b)=>a.r-b.r);

  // Analytical curve
  const nPts=120, rMaxPlot=mesh.domR*0.4;
  const analyticalPts=[];
  for(let i=0;i<nPts;i++){
    const r_=(i+0.5)/nPts*rMaxPlot;
    const hh=mesh.beadH;
    const dBz=(MU0/(4*Math.PI))*mom*(2*hh*hh-r_*r_)/Math.pow(r_*r_+hh*hh,2.5);
    analyticalPts.push({r:r_,dBz});
  }

  // Find plot range
  let yMin=0,yMax=0;
  for(const p of sensorEls){yMin=Math.min(yMin,p.dBz);yMax=Math.max(yMax,p.dBz);}
  for(const p of analyticalPts){yMin=Math.min(yMin,p.dBz);yMax=Math.max(yMax,p.dBz);}
  const yPad=(yMax-yMin)*0.12||1e-6;yMin-=yPad;yMax+=yPad;

  // Smart Y-axis: find a common scale factor for clean tick labels
  const yAbsMax=Math.max(Math.abs(yMin),Math.abs(yMax));
  const yExp=yAbsMax>0?Math.floor(Math.log10(yAbsMax)):0;
  const yScale=Math.pow(10,yExp);

  const toX=r=>pad.left+r/rMaxPlot*pW;
  const toY=v=>pad.top+(1-(v-yMin)/(yMax-yMin))*pH;

  // Grid lines
  ctx.strokeStyle='rgba(30,41,59,0.3)';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){const y=pad.top+pH*i/5;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+pW,y);ctx.stroke();}
  for(let i=1;i<=3;i++){const x=pad.left+pW*i/4;ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+pH);ctx.stroke();}

  // Axes border
  ctx.strokeStyle='rgba(100,116,139,0.4)';ctx.lineWidth=1;
  ctx.strokeRect(pad.left,pad.top,pW,pH);

  // Analytical line (green, solid)
  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  analyticalPts.forEach((p,i)=>{const x=toX(p.r),y=toY(p.dBz);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();

  // FEM points (scatter)
  ctx.fillStyle='rgba(6,182,212,0.75)';
  const step=Math.max(1,Math.floor(sensorEls.length/250));
  for(let i=0;i<sensorEls.length;i+=step){
    const p=sensorEls[i];
    if(p.r>rMaxPlot) continue;
    const x=toX(p.r),y=toY(p.dBz);
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();
  }

  // Sensor half-width dashed marker
  if(mesh.sensHW<rMaxPlot){
    const sx=toX(mesh.sensHW);
    ctx.strokeStyle='rgba(167,139,250,0.45)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(sx,pad.top);ctx.lineTo(sx,pad.top+pH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(167,139,250,0.7)';ctx.font=`${lfs}px "DM Sans"`;
    ctx.textAlign='left';ctx.fillText('sensor edge',sx+4,pad.top+14);
  }

  // Title
  ctx.fillStyle='#cbd5e1';ctx.font=`600 ${fs}px "DM Sans"`;ctx.textAlign='left';
  ctx.fillText('FEM vs Analytical \u0394Bz at Sensor Plane',pad.left,pad.top-14);

  // Y-axis label with exponent
  const supDigits='\u2070\u00b9\u00b2\u00b3\u2074\u2075\u2076\u2077\u2078\u2079';
  const expStr=(yExp<0?'\u207b':'')+String(Math.abs(yExp)).split('').map(d=>supDigits[+d]).join('');
  ctx.fillStyle='#94a3b8';ctx.font=`${fs}px "DM Sans"`;ctx.textAlign='center';
  ctx.save();ctx.translate(14,pad.top+pH/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('\u0394Bz (\u00d710'+expStr+' T)',0,0);
  ctx.restore();

  // Y ticks
  ctx.font=`${tfs}px "JetBrains Mono"`;ctx.fillStyle='#94a3b8';ctx.textAlign='right';
  for(let i=0;i<=5;i++){
    const v=yMin+(yMax-yMin)*i/5;
    const vs=v/yScale;
    const y=pad.top+pH*(1-i/5);
    ctx.fillText(vs.toFixed(2),pad.left-6,y+4);
    ctx.strokeStyle='rgba(100,116,139,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left-3,y);ctx.lineTo(pad.left,y);ctx.stroke();
  }

  // X-axis label
  ctx.fillStyle='#94a3b8';ctx.font=`${fs}px "DM Sans"`;ctx.textAlign='center';
  ctx.fillText('Radial distance r (\u00b5m)',pad.left+pW/2,H-6);

  // X ticks
  ctx.font=`${tfs}px "JetBrains Mono"`;ctx.fillStyle='#94a3b8';ctx.textAlign='center';
  for(let i=0;i<=4;i++){
    const r_=rMaxPlot*i/4;
    const x=toX(r_);
    ctx.fillText((r_*1e6).toFixed(0),x,pad.top+pH+16);
    ctx.strokeStyle='rgba(100,116,139,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,pad.top+pH);ctx.lineTo(x,pad.top+pH+3);ctx.stroke();
  }

  // Legend — top right corner with background
  const lgW=160,lgH=42;
  const lgX=pad.left+pW-lgW-4,lgY=pad.top+6;
  ctx.fillStyle='rgba(13,20,36,0.88)';
  ctx.strokeStyle='rgba(100,116,139,0.25)';ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect){ctx.roundRect(lgX,lgY,lgW,lgH,4);}else{ctx.rect(lgX,lgY,lgW,lgH);}
  ctx.fill();ctx.stroke();
  ctx.font=`${lfs+1}px "DM Sans"`;ctx.textAlign='left';
  // Analytical legend entry
  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(lgX+8,lgY+14);ctx.lineTo(lgX+28,lgY+14);ctx.stroke();
  ctx.fillStyle='#cbd5e1';ctx.fillText('Analytical (dipole)',lgX+34,lgY+18);
  // FEM legend entry
  ctx.fillStyle='#06b6d4';ctx.beginPath();ctx.arc(lgX+18,lgY+32,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cbd5e1';ctx.fillText('FEM (axisymmetric)',lgX+34,lgY+36);
}

// Convergence residual chart
function drawFEMConvergence(canvas, residuals) {
  const W=canvas.width/2, H=canvas.height/2;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(2,0,0,2,0,0);
  ctx.fillStyle='#0d1424';ctx.fillRect(0,0,W,H);
  if(!residuals||residuals.length<2) return;
  const fs=12,tfs=10;
  const pad={top:28,right:16,bottom:36,left:52};
  const pW=W-pad.left-pad.right,pH=H-pad.top-pad.bottom;
  const n=residuals.length;
  // Log scale Y
  const logRes=residuals.map(r=>Math.log10(Math.max(r,1e-20)));
  let yMin=Math.floor(Math.min(...logRes)),yMax=Math.ceil(Math.max(...logRes));
  if(yMax-yMin<2){yMin=yMax-2;}
  const toX=i=>pad.left+(i/(n-1))*pW;
  const toY=v=>pad.top+(1-(v-yMin)/(yMax-yMin))*pH;
  // Grid
  ctx.strokeStyle='rgba(30,41,59,0.3)';ctx.lineWidth=0.5;
  for(let y=yMin;y<=yMax;y++){const py=toY(y);ctx.beginPath();ctx.moveTo(pad.left,py);ctx.lineTo(pad.left+pW,py);ctx.stroke();}
  ctx.strokeStyle='rgba(100,116,139,0.4)';ctx.lineWidth=1;
  ctx.strokeRect(pad.left,pad.top,pW,pH);
  // Line
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();
  logRes.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  // Tolerance line
  const tolY=toY(-10);
  if(tolY>pad.top&&tolY<pad.top+pH){
    ctx.strokeStyle='rgba(239,68,68,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad.left,tolY);ctx.lineTo(pad.left+pW,tolY);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle='rgba(239,68,68,0.6)';ctx.font=`${tfs}px "DM Sans"`;
    ctx.textAlign='left';ctx.fillText('tol=10\u207b\u00b9\u2070',pad.left+4,tolY-4);
  }
  // Labels
  ctx.fillStyle='#94a3b8';ctx.font=`${fs}px "DM Sans"`;ctx.textAlign='center';
  ctx.fillText('CG Iteration',pad.left+pW/2,H-6);
  ctx.save();ctx.translate(12,pad.top+pH/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('log\u2081\u2080(residual)',0,0);ctx.restore();
  // Y ticks
  ctx.font=`${tfs}px "JetBrains Mono"`;ctx.fillStyle='#94a3b8';ctx.textAlign='right';
  for(let y=yMin;y<=yMax;y++){ctx.fillText('10'+('\u2070\u00b9\u00b2\u00b3\u2074\u2075\u2076\u2077\u2078\u2079'[Math.abs(y%10)]||y),pad.left-5,toY(y)+4);}
  // Actually write proper superscripts for Y labels
  ctx.clearRect(0,0,pad.left-2,H);
  ctx.fillStyle='#0d1424';ctx.fillRect(0,0,pad.left-2,H);
  ctx.fillStyle='#94a3b8';ctx.font=`${tfs}px "JetBrains Mono"`;ctx.textAlign='right';
  const supD='\u2070\u00b9\u00b2\u00b3\u2074\u2075\u2076\u2077\u2078\u2079';
  for(let y=yMin;y<=yMax;y++){
    const expS=(y<0?'\u207b':'')+String(Math.abs(y)).split('').map(d=>supD[+d]).join('');
    ctx.fillText('10'+expS,pad.left-5,toY(y)+4);
  }
  // X ticks
  ctx.textAlign='center';
  const xStep=Math.max(1,Math.round(n/5));
  for(let i=0;i<=n-1;i+=xStep){ctx.fillText(i.toString(),toX(i),pad.top+pH+14);}
  // Title
  ctx.fillStyle='#cbd5e1';ctx.font=`600 ${fs}px "DM Sans"`;ctx.textAlign='left';
  ctx.fillText('PCG Solver Convergence',pad.left,pad.top-10);
}

// Interactive field map: draws probe crosshair at given (r,z) coords
function drawFEMFieldProbe(canvas, mesh, fd, probeR, probeZ) {
  const W=canvas.width/2, H=canvas.height/2;
  const ctx=canvas.getContext('2d');
  const pad={top:38,right:80,bottom:48,left:56};
  const pW=W-pad.left-pad.right, pH=H-pad.top-pad.bottom;
  const rMax=mesh.domR, zMin=mesh.domZlo, zMax=mesh.domZhi;
  const toP=(r,z)=>[pad.left+(r+rMax)/(2*rMax)*pW, pad.top+(1-(z-zMin)/(zMax-zMin))*pH];
  const[px,py]=toP(probeR,probeZ);
  // Draw crosshair
  ctx.setTransform(2,0,0,2,0,0);
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pad.left,py);ctx.lineTo(pad.left+pW,py);ctx.stroke();
  ctx.beginPath();ctx.moveTo(px,pad.top);ctx.lineTo(px,pad.top+pH);ctx.stroke();
  ctx.setLineDash([]);
  // Probe dot
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='var(--primary)';ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
}

// Find element and ΔBz at given (r,z) coordinates in mesh
function femProbeAt(mesh, fd, r, z) {
  // Find closest element centroid
  let best=-1, bestD=Infinity;
  for(let i=0;i<mesh.elements.length;i++){
    const el=mesh.elements[i];
    const dr=Math.abs(el.cr)-Math.abs(r), dz=el.cz-z;
    const d=dr*dr+dz*dz;
    if(d<bestD){bestD=d;best=i;}
  }
  if(best<0) return null;
  const el=mesh.elements[best];
  return {dBz:fd[best].dBz, Bz:fd[best].Bz, Br:fd[best].Br, inBead:el.inBead, muR:el.muR, r:el.cr, z:el.cz};
}

// ── FEM Page Component ──
function FEMPage({matIdx, customMat, beadIdx, beadMode, customBead,
  sensMode, sensIdx, customSensor, B0, vBias, fixedHeight, Vg}) {

  const canvasRef = useRef(null);
  const compRef = useRef(null);
  const convRef = useRef(null);
  const tooltipRef = useRef(null);
  const [solving, setSolving] = useState(false);
  const [solveProgress, setSolveProgress] = useState(0);
  const [result, setResult] = useState(null);
  const [meshRes, setMeshRes] = useState('medium');
  const [femBeadR, setFemBeadR] = useState(null);
  const [femBeadH, setFemBeadH] = useState(null);
  const [femB0, setFemB0] = useState(null);
  const [femMuR, setFemMuR] = useState(null);
  const [fieldView, setFieldView] = useState('field'); // field | mesh | both
  const [showExplain, setShowExplain] = useState(true);

  // Derive defaults from app state
  const isCustomMat = matIdx >= MATERIALS.length;
  const mat = isCustomMat ? customMat : MATERIALS[matIdx];
  const mProps = computeMatProps(mat, Vg);
  const bead = beadMode==='custom' ? customBead : BEAD_LIBRARY[beadIdx];
  const bR = (femBeadR !== null ? femBeadR : (bead.d || bead.d_m || 2.83e-6) * 0.5);
  const bMuR = femMuR !== null ? femMuR : (bead.mu_r || 10);
  const bH = (femBeadH !== null ? femBeadH : fixedHeight) * 1e-6;
  const b0 = (femB0 !== null ? femB0 : B0) * 1e-3;
  const sensor = sensMode==='preset' ? [{size:5e-6,t:0.5e-6},{size:10e-6,t:1e-6},{size:50e-6,t:1e-6}][sensIdx] : customSensor;
  const sensHW = sensor.size / 2;
  const sensT = sensor.t;

  const meshNMap = {coarse:40, medium:70, fine:100, ultra:140};
  const nG = meshNMap[meshRes] || 70;

  // Redraw field when view mode changes
  useEffect(() => {
    if (!result || !canvasRef.current) return;
    const c = canvasRef.current;
    const W = c.parentElement.clientWidth, H = c.parentElement.clientHeight || 400;
    c.width = W*2; c.height = H*2; c.style.width = W+'px'; c.style.height = H+'px';
    drawFEMField(c, result.mesh, result.fd, {showMesh: fieldView!=='field', meshOnly: fieldView==='mesh'});
  }, [result, fieldView]);

  // Draw comparison + convergence charts
  useEffect(() => {
    if (!result) return;
    if (compRef.current) {
      const c = compRef.current;
      const wrap = c.closest('.fem-comparison');
      const W = (wrap ? wrap.clientWidth - 32 : 500);
      const cH = Math.max(240, Math.round(W * 0.5));
      c.width = W*2; c.height = cH*2; c.style.width = W+'px'; c.style.height = cH+'px';
      drawFEMComparison(c, result.mesh, result.fd, result.mom, {});
    }
    if (convRef.current && result.sol.res.length > 1) {
      const c = convRef.current;
      const wrap = c.closest('.fem-convergence');
      const W = (wrap ? wrap.clientWidth - 32 : 500);
      const cH = Math.max(200, Math.round(W * 0.4));
      c.width = W*2; c.height = cH*2; c.style.width = W+'px'; c.style.height = cH+'px';
      drawFEMConvergence(c, result.sol.res);
    }
  }, [result]);

  // Interactive mouse hover on field canvas
  useEffect(() => {
    if (!result || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const mesh = result.mesh, fd = result.fd;
    const pad={top:38,right:80,bottom:48,left:56};

    function onMove(e) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const W = rect.width, H = rect.height;
      const pW=W-pad.left-pad.right, pH=H-pad.top-pad.bottom;
      // Convert pixel to (r, z)
      const rFrac = (mx - pad.left) / pW;
      const zFrac = 1 - (my - pad.top) / pH;
      if(rFrac < 0 || rFrac > 1 || zFrac < 0 || zFrac > 1) {
        if(tooltipRef.current) tooltipRef.current.classList.remove('vis');
        return;
      }
      const rMax=mesh.domR, zMin=mesh.domZlo, zMax=mesh.domZhi;
      const probeR = (rFrac * 2 - 1) * rMax; // -rMax to +rMax
      const probeZ = zMin + zFrac * (zMax - zMin);
      const info = femProbeAt(mesh, fd, probeR, probeZ);
      if(!info || !tooltipRef.current) return;
      const tt = tooltipRef.current;
      tt.classList.add('vis');
      // Position tooltip
      const ttX = Math.min(mx + 16, W - 200);
      const ttY = Math.max(my - 70, 4);
      tt.style.left = ttX + 'px';
      tt.style.top = ttY + 'px';
      const dBzVal = info.dBz;
      const cls = dBzVal > 0 ? 'pos' : dBzVal < 0 ? 'neg' : '';
      tt.innerHTML = '<div class="tt-label">Position</div>'
        + '<div>r = <span class="tt-val">' + (Math.abs(probeR)*1e6).toFixed(1) + ' \u00b5m</span>'
        + '  z = <span class="tt-val">' + (probeZ*1e6).toFixed(1) + ' \u00b5m</span></div>'
        + '<div class="tt-label" style="margin-top:4px">\u0394Bz</div>'
        + '<div class="tt-val ' + cls + '">' + femFmtSI(dBzVal) + 'T</div>'
        + (info.inBead ? '<div style="color:#f59e0b;margin-top:2px">Inside bead (\u03bc\u1d63=' + info.muR.toFixed(0) + ')</div>' : '')
        + '<div class="tt-label" style="margin-top:2px">|B| = <span class="tt-val">' + femFmtSI(Math.sqrt(info.Br*info.Br+info.Bz*info.Bz)) + 'T</span></div>';

      // Redraw field + crosshair overlay
      const c = canvas;
      const cW = c.parentElement.clientWidth, cH = c.parentElement.clientHeight || 400;
      c.width = cW*2; c.height = cH*2; c.style.width = cW+'px'; c.style.height = cH+'px';
      drawFEMField(c, mesh, fd, {showMesh: fieldView==='mesh'||fieldView==='both'});
      drawFEMFieldProbe(c, mesh, fd, probeR, probeZ);
    }

    function onLeave() {
      if(tooltipRef.current) tooltipRef.current.classList.remove('vis');
      // Redraw without crosshair
      const c = canvas;
      const cW = c.parentElement.clientWidth, cH = c.parentElement.clientHeight || 400;
      c.width = cW*2; c.height = cH*2; c.style.width = cW+'px'; c.style.height = cH+'px';
      drawFEMField(c, mesh, fd, {showMesh: fieldView==='mesh'||fieldView==='both'});
    }

    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseleave', onLeave);
    return () => { canvas.removeEventListener('mousemove', onMove); canvas.removeEventListener('mouseleave', onLeave); };
  }, [result, fieldView]);

  function doSolve() {
    setSolving(true);
    setSolveProgress(0);
    setTimeout(() => {
      try {
        const beadR_m = bR < 1e-3 ? bR : bR * 1e-6;
        const beadH_m = bH < 1e-3 ? bH : bH * 1e-6;
        setSolveProgress(10);
        const mesh = femCreateMesh(beadR_m, beadH_m, sensHW, sensT, bMuR, nG);
        setSolveProgress(30);
        const sol = femSolve(mesh, b0, 1e-10, 2000);
        setSolveProgress(70);
        const fd = femField(mesh, sol.phi, b0);
        const femAvg = femSensorAvg(mesh, fd, sensHW);
        const mom = beadMoment(beadR_m, bMuR, b0);
        const anaAvg = femAnalyticalSensorAvg(mom, sensHW, beadH_m, sensT, 60);
        const femDVH = Math.abs(mProps.RH * mProps.sigma * femAvg * vBias) * 1000;
        const anaDVH = Math.abs(mProps.RH * mProps.sigma * anaAvg * vBias) * 1000;
        const errPct = anaDVH > 0 ? Math.abs(femDVH - anaDVH) / anaDVH * 100 : 0;
        setSolveProgress(100);

        setResult({mesh, fd, sol, femAvg, anaAvg, femDVH, anaDVH, errPct, mom,
          nNodes: sol.N, nElems: mesh.elements.length, solveMs: sol.solveTime,
          cgIter: sol.iter, finalRes: sol.res[sol.res.length-1]||0,
          beadR_m: beadR_m, beadH_m: beadH_m, b0_T: b0, bMuR_val: bMuR});
      } catch(e) { console.error('FEM solve error:', e); }
      setSolving(false);
    }, 50);
  }

  const bR_um = (bR < 1e-3 ? bR*1e6 : bR).toFixed(2);
  const bH_um = (bH < 1e-3 ? bH*1e6 : bH).toFixed(1);

  // Error interpretation
  const errInterpret = result ? (
    result.errPct < 3 ? 'Excellent agreement \u2014 dipole approximation is highly accurate for these parameters.'
    : result.errPct < 8 ? 'Good agreement. Minor deviation from dipole model due to finite bead size and sensor proximity.'
    : result.errPct < 15 ? 'Moderate deviation. The bead is close enough to the sensor that higher-order multipole terms matter. The dipole model underestimates near-field contributions.'
    : 'Significant deviation. The bead-sensor distance is comparable to the bead radius (h/R=' + (result.beadH_m/result.beadR_m).toFixed(1) + '), violating the point-dipole assumption. FEM captures the true distributed magnetization.'
  ) : '';

  return h('div', {className:'fem-wrap'},
    // ─── Controls sidebar ───
    h('div', {className:'fem-controls'},
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--bead)'}}), ' Bead Parameters'),
        h(Slider, {label:'Radius (R)', value:+bR_um, min:0.1, max:10, step:0.05, unit:' \u00b5m',
          onChange:v=>setFemBeadR(v*1e-6)}),
        h(Slider, {label:'Rel. permeability \u03bc\u1d63', value:bMuR, min:2, max:100, step:1, unit:'',
          onChange:v=>setFemMuR(v)}),
        h(Slider, {label:'Height above sensor (h)', value:+bH_um, min:0.5, max:30, step:0.5, unit:' \u00b5m',
          onChange:v=>setFemBeadH(v)}),
        showExplain && h('div',{className:'fem-explain'},
          'The bead acquires a magnetic moment ', h('span',{className:'eq-inline'},'m = V\u00b7\u03c7\u2091\u1da0\u1da0\u00b7H\u2080'),
          ' in the applied field. ',
          h('b',null,'h/R ratio: '), ((bH < 1e-3 ? bH*1e6 : bH) / (bR < 1e-3 ? bR*1e6 : bR)).toFixed(1),
          ' \u2014 ', ((bH < 1e-3 ? bH*1e6 : bH) / (bR < 1e-3 ? bR*1e6 : bR)) > 3 ? 'dipole approx. valid' : 'near-field effects significant',
        ),
      ),
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--primary)'}}), ' Applied Field'),
        h(Slider, {label:'B\u2080', value:femB0!==null?femB0:B0, min:10, max:500, step:5, unit:' mT',
          onChange:v=>setFemB0(v)}),
        h('div',{className:'fem-mesh-info',style:{marginTop:'6px'}},
          h('span',{className:'mi-label'},'Sensor:'),h('span',{className:'mi-val'},(sensor.size*1e6).toFixed(0)+'\u00d7'+(sensor.size*1e6).toFixed(0)+' \u00b5m\u00b2'),
          h('span',{className:'mi-label'},'Thickness:'),h('span',{className:'mi-val'},(sensor.t*1e6).toFixed(1)+' \u00b5m'),
          h('span',{className:'mi-label'},'Material:'),h('span',{className:'mi-val'},isCustomMat?'Custom':mat.name),
          h('span',{className:'mi-label'},'R\u2095:'),h('span',{className:'mi-val'},mProps.RH.toExponential(2)+' m\u00b3/C'),
        ),
      ),
      h('div', {className:'d-card'},
        h('div', {className:'d-card-title'}, h('span',{className:'dot',style:{background:'var(--signal)'}}), ' Mesh Resolution'),
        h('div', {className:'mode-tabs'},
          ['coarse','medium','fine','ultra'].map(r =>
            h('button', {key:r, className:'mode-tab'+(meshRes===r?' active':''),
              onClick:()=>setMeshRes(r), disabled:solving},
              r.charAt(0).toUpperCase()+r.slice(1))
          )
        ),
        h('div',{className:'fem-mesh-info'},
          h('span',{className:'mi-label'},'Grid:'),h('span',{className:'mi-val'},nG+'\u00d7'+nG),
          h('span',{className:'mi-label'},'Elements:'),h('span',{className:'mi-val'},'~'+((nG)*(nG)*2).toLocaleString()),
          h('span',{className:'mi-label'},'Refinement:'),h('span',{className:'mi-val'},'Adaptive (bead+sensor)'),
        ),
        showExplain && h('div',{className:'fem-explain',style:{marginTop:'8px'}},
          'Structured mesh with Lorentzian density peaks near bead boundary (w=12) and sensor surface (w=8). Each quad cell splits into 2 triangles.',
        ),
      ),
      h('button', {className:'fem-solve-btn', onClick:doSolve, disabled:solving},
        solving ? 'Solving\u2026' : '\u25b6 Solve FEM'),
      solving && h('div',{className:'fem-progress'},
        h('div',{className:'fem-progress-bar',style:{width:solveProgress+'%'}})),
      result && h('div', {className:'fem-status'},
        h('div',null,result.nNodes.toLocaleString()+' nodes \u00b7 '+result.nElems.toLocaleString()+' elements'),
        h('div',null,result.cgIter+' CG iters \u00b7 '+result.solveMs.toFixed(0)+' ms'),
        h('div',null,'Residual: '+result.finalRes.toExponential(2)),
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px'}},
        h('button',{
          style:{fontSize:'var(--fs-xs)',color:showExplain?'var(--primary)':'var(--muted)',background:'none',border:'1px solid '+(showExplain?'var(--primary-dim)':'var(--subtle)'),borderRadius:'4px',padding:'4px 10px',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"},
          onClick:()=>setShowExplain(!showExplain)},
          showExplain ? '\u25bc Hide Explanations' : '\u25b6 Show Explanations'),
      ),
    ),

    // ─── Field visualization (spans 2 columns) ───
    h('div', {className:'fem-canvas-wrap'},
      h('canvas', {ref:canvasRef}),
      h('div', {ref:tooltipRef, className:'fem-tooltip'}),
      // View mode tabs overlay
      h('div',{style:{position:'absolute',top:'8px',left:'8px',display:'flex',gap:'2px',zIndex:5}},
        h('div',{className:'fem-view-tabs'},
          ['field','mesh','both'].map(v=>
            h('button',{key:v,className:'fem-view-tab'+(fieldView===v?' active':''),
              onClick:()=>setFieldView(v)},
              v==='field'?'\u0394Bz Field':v==='mesh'?'Mesh':'\u0394Bz + Mesh')
          ),
        ),
      ),
      !result && h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:'var(--fs-md)',gap:'12px'}},
        h('div',{style:{fontSize:'var(--fs-xl)',opacity:0.3}},'\ud83d\udd2c'),
        'Configure parameters and click Solve FEM',
        h('div',{style:{fontSize:'var(--fs-xs)',maxWidth:'340px',textAlign:'center',lineHeight:'1.5'}},
          'The solver builds a 2D axisymmetric triangular mesh, assembles the magnetostatic stiffness matrix, and solves \u2207\u00b7(\u03bc\u1d63\u2207\u03c6) = 0 with preconditioned conjugate gradient.'),
      ),
    ),

    // ─── Comparison chart ───
    h('div', {className:'fem-comparison'},
      result ? h(React.Fragment, null,
        h('div', {className:'fem-results'},
          h('div', {className:'fem-result-card'},
            h('div', {className:'fem-result-label'}, 'FEM \u0394V\u2095'),
            h('div', {className:'fem-result-value'}, result.femDVH.toFixed(4)+' mV'),
          ),
          h('div', {className:'fem-result-card'},
            h('div', {className:'fem-result-label'}, 'Analytical \u0394V\u2095'),
            h('div', {className:'fem-result-value'}, result.anaDVH.toFixed(4)+' mV'),
          ),
          h('div', {className:'fem-result-card'},
            h('div', {className:'fem-result-label'}, 'Difference'),
            h('div', {className:'fem-result-value '+(result.errPct<5?'good':result.errPct<15?'warn':'')},
              result.errPct.toFixed(1)+'%'),
          ),
        ),
        showExplain && h('div',{className:'fem-explain',style:{marginBottom:'8px'}},
          h('b',null,'Interpretation: '), errInterpret,
          ' The Clausius\u2013Mossotti effective susceptibility is ',
          h('span',{className:'eq-inline'},'\u03c7\u2091\u1da0\u1da0 = 3(\u03bc\u1d63\u22121)/(\u03bc\u1d63+2) = '+(3*(bMuR-1)/(bMuR+2)).toFixed(2)),
          '.',
        ),
        h('canvas', {ref:compRef, style:{width:'100%'}}),
      ) : h('div',{style:{color:'var(--muted)',fontSize:'var(--fs-sm)',textAlign:'center',padding:'20px',lineHeight:'1.7'}},
        h('div',{style:{fontSize:'var(--fs-md)',marginBottom:'8px'}},'FEM vs. Analytical Comparison'),
        'After solving, this panel shows the radial profile of \u0394Bz at the sensor plane. ',
        'The green curve is the point-dipole analytical model; cyan dots are FEM element values.',
      ),
    ),

    // ─── Convergence chart ───
    h('div', {className:'fem-convergence'},
      result && result.sol.res.length > 1 ? h(React.Fragment, null,
        h('canvas', {ref:convRef, style:{width:'100%'}}),
        showExplain && h('div',{className:'fem-explain',style:{marginTop:'8px'}},
          'The preconditioned conjugate gradient (PCG) solver minimizes ',
          h('span',{className:'eq-inline'},'K\u03c6 = f'),
          ' with diagonal preconditioning. ',
          'Converged in ', h('b',null,result.cgIter), ' iterations to residual ',
          h('span',{className:'eq-inline'},result.finalRes.toExponential(2)),
          '. Penalty method (10\u2078\u00b7max(K\u1d62\u1d62)) enforces Dirichlet BCs on domain boundaries.',
        ),
      ) : h('div',{style:{color:'var(--muted)',fontSize:'var(--fs-sm)',textAlign:'center',padding:'16px',lineHeight:'1.7'}},
        h('div',{style:{fontSize:'var(--fs-md)',marginBottom:'6px'}},'Solver Convergence'),
        'Shows log\u2081\u2080(residual) vs. CG iteration after solving.',
      ),
    ),
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APPLICATION
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Navigation ──
  const [page, setPage] = useState('intro');

  // ── Material state ──
  const [matIdx, setMatIdx] = useState(0); // Graphene default
  const [customMat, setCustomMat] = useState({mu:3000, n:5e15, dim:'2D'});
  const [Vg, setVg] = useState(null); // null = gate off, number = gate voltage

  // Reset Vg when switching to non-gate material
  useEffect(() => {
    const mat = matIdx < MATERIALS.length ? MATERIALS[matIdx] : customMat;
    if (!mat.gate && Vg !== null) setVg(null);
  }, [matIdx]);

  // ── Sensor state ──
  const [sensMode, setSensMode] = useState('preset');
  const [sensIdx, setSensIdx] = useState(1);
  const [customSensor, setCustomSensor] = useState({size:10e-6, t:1e-6});

  // ── Bead state ──
  const [beadMode, setBeadMode] = useState('preset');
  const [beadIdx, setBeadIdx] = useState(3); // M-280 default
  const [customBead, setCustomBead] = useState({d:5e-6, mu_r:10});

  // ── Sim params ──
  const [vBias, setVBias] = useState(5);
  const [B0, setB0] = useState(100);
  const [chH, setChH] = useState(50);
  const [flowVel, setFlowVel] = useState(1.0);
  const [nBeads, setNBeads] = useState(10);
  const [heightMode, setHeightMode] = useState('fixed');
  const [fixedHeight, setFixedHeight] = useState(3);
  const [minHeight, setMinHeight] = useState(2);
  const [maxHeight, setMaxHeight] = useState(10);
  const [threshold, setThreshold] = useState(1);
  const [simState, setSimState] = useState('idle');
  const [speed, setSpeed] = useState(5);
  const [, forceUpdate] = useState(0);

  // ── Active config ──
  const isCustomMat = matIdx >= MATERIALS.length;
  const activeMat = isCustomMat ? customMat : MATERIALS[matIdx];
  const mp = useMemo(() => computeMatProps(activeMat, Vg), [activeMat.mu, activeMat.n, activeMat.dim, Vg]);
  const sensor = sensMode === 'custom' ? customSensor : SENSOR_PRESETS[sensIdx];
  const bead = beadMode === 'custom' ? customBead : BEAD_LIBRARY[beadIdx];

  // ── Derived physics ──
  const chH_m = chH * 1e-6;
  const chW_m = sensor.size;
  const B0_T = B0 * 1e-3;
  const r_bead = bead.d / 2;
  const vAvg = flowVel * 1e-3;
  const mom = beadMoment(r_bead, bead.mu_r, B0_T);
  const activeRH = mp.RH;
  const activeSigma = mp.sigma;

  const visLen = Math.max(sensor.size * 25, 500e-6);
  const beadSpacing = Math.max(sensor.size * 6, visLen / (nBeads + 2));
  const SCENE_LEN = 18, SCENE_H = 2.5, SCENE_W = 1.5;
  const scaleX = SCENE_LEN / visLen, scaleY = SCENE_H / chH_m, scaleZ = SCENE_W / chW_m;
  const beadSceneScale = SCENE_W / (sensor.size || 10e-6); // scale bead relative to sensor width
  const rScene = Math.max(0.12, r_bead * beadSceneScale * 0.9);
  const Q_uLmin = vAvg * chW_m * chH_m * 60 * 1e6;

  // ── Refs ──
  const sceneRef = useRef(null), sceneContRef = useRef(null);
  const traceRef = useRef(null), traceContRef = useRef(null);
  const simRef = useRef({beads:[], signalBuf:[], time:0, peakSignal:0, batchDone:false, pulseData:[]});

  // ── Init 3D ──
  useEffect(() => {
    if (!sceneContRef.current || page !== 'simulator') return;
    if (sceneRef.current) return; // already initialized
    const sc = new FluidScene(sceneContRef.current);
    sceneRef.current = sc;
    return () => { sc.dispose(); sceneRef.current = null; };
  }, [page]);

  // ── Update geometry ──
  useEffect(() => {
    const sc = sceneRef.current; if (!sc) return;
    sc.buildChannel(SCENE_LEN, SCENE_H, SCENE_W);
    sc.buildSensor(SCENE_W, 0.15, SCENE_W);
  }, [sensIdx, sensMode, customSensor.size, chH, page]);

  // ── Batch control ──
  function startBatch() {
    const sim = simRef.current;
    sim.beads = []; sim.signalBuf = []; sim.time = 0;
    sim.peakSignal = 0; sim.batchDone = false; sim.pulseData = [];
    for (let i = 0; i < nBeads; i++) {
      const startX = -visLen/2 - r_bead*2 - i * beadSpacing;
      let y = heightMode === 'fixed' ? fixedHeight * 1e-6 : (minHeight + Math.random() * (maxHeight - minHeight)) * 1e-6;
      y = Math.max(y, r_bead * 2 + 0.2e-6); // bead center must be at least one diameter above sensor
      const z = (Math.random() - 0.5) * chW_m * 0.4;
      sim.beads.push({id:i+1, x:startX, y, z, active:true, passed:false, detected:false, peakDVH:0, currentDVH:0, height_um:y*1e6});
    }
    setSimState('running');
  }

  function resetSim() {
    const sim = simRef.current;
    sim.beads = []; sim.signalBuf = []; sim.time = 0;
    sim.peakSignal = 0; sim.batchDone = false; sim.pulseData = [];
    setSimState('idle'); forceUpdate(n => n + 1);
  }

  // ── Animation loop ──
  useEffect(() => {
    if (page !== 'simulator') return;
    let raf, lastT = performance.now();
    const sim = simRef.current;

    function tick(now) {
      const rawDt = (now - lastT) / 1000; lastT = now;
      const dt = Math.min(rawDt, 0.05) * (simState === 'running' ? speed : 0);

      if (simState === 'running') {
        let anyActive = false;
        const detZone = sensor.size * 10;
        const noiseRMS = 0.15e-3 * vBias;
        const maxV = heightMode === 'fixed' ? vAvg : 1.5 * vAvg;
        const frameDx = maxV * dt;
        const maxStep = sensor.size * 0.4;
        const nSub = Math.max(1, Math.ceil(frameDx / maxStep));
        const subDt = dt / nSub;

        for (let step = 0; step < nSub; step++) {
          for (const b of sim.beads) {
            if (!b.active) continue;
            const v = heightMode === 'fixed' ? vAvg : flowVelocity(b.y, chH_m, vAvg);
            b.x += v * subDt;
            if (heightMode !== 'fixed') b.y = Math.max(r_bead + 0.2e-6, b.y - 0.3e-6 * subDt);
          }
          let subTotal = 0;
          for (const b of sim.beads) {
            if (!b.active) continue;
            if (Math.abs(b.x) < detZone) {
              const Bz = volumeAvgBz(mom, b.x, b.z, b.y, sensor.size, sensor.t, 6, 1);
              const dvh = Math.abs(activeRH * activeSigma * Bz * vBias);
              b.currentDVH = dvh;
              if (dvh > b.peakDVH) b.peakDVH = dvh;
              if (!b.detected && dvh * 1000 > threshold) b.detected = true;
              subTotal += dvh;
            } else { b.currentDVH = 0; }
          }
          const noise = (Math.random() - 0.5) * 2 * noiseRMS;
          const tSub = sim.time + (step + 1) * subDt;
          sim.signalBuf.push({t:tSub, v:subTotal*1000, vn:(subTotal+noise)*1000});
          if (subTotal*1000 > sim.peakSignal) sim.peakSignal = subTotal*1000;
        }
        while (sim.signalBuf.length > 3000) sim.signalBuf.shift();
        sim.time += dt;
        for (const b of sim.beads) {
          if (!b.active) continue;
          if (b.x > visLen/2 + r_bead * 4) { b.active = false; b.passed = true; }
          else anyActive = true;
        }
        if (!anyActive && sim.beads.length > 0) {
          sim.batchDone = true;
          sim.pulseData = sim.beads.map(b => ({id:b.id, peakDVH:b.peakDVH*1000, detected:b.detected, height_um:b.height_um}));
          setSimState('done');
        }
        forceUpdate(n => n + 1);
      }

      const sc = sceneRef.current;
      if (sc) {
        const positions = sim.beads.map(b => {
          if (!b.active) return null;
          return {sx:b.x*scaleX, sy:b.y*scaleY, sz:b.z*scaleZ, detected:b.detected, glow:Math.min(b.currentDVH*1000/20,1)};
        });
        sc.updateBeads(positions, rScene);
        const maxSig = sim.beads.reduce((mx,b)=>Math.max(mx,b.currentDVH||0),0);
        sc.setSensorGlow(Math.min(maxSig*1000/10,1));
        sc.render();
      }
      drawTrace();
      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [page, simState, speed, chH_m, chW_m, vAvg, mom, r_bead, sensor.size, sensor.t,
      vBias, threshold, visLen, scaleX, scaleY, scaleZ, rScene, nBeads, beadSpacing, heightMode, activeRH, activeSigma]);

  // ── Trace drawing ──
  function drawTrace() {
    const canvas = traceRef.current, cont = traceContRef.current;
    if (!canvas || !cont) return;
    const W = cont.clientWidth, H = cont.clientHeight;
    if (canvas.width !== W*2 || canvas.height !== H*2) { canvas.width = W*2; canvas.height = H*2; }
    const ctx = canvas.getContext('2d'); ctx.setTransform(2, 0, 0, 2, 0, 0); ctx.clearRect(0, 0, W, H);
    const sim = simRef.current;
    const axFS = chartFS(W,'axisLabel'), tkFS = chartFS(W,'tickValue');
    const tickW = Math.round(tkFS * 3.6);
    const tPadL = tickW + Math.round(axFS * 1.4) + 4;
    const pad = {top:28, bottom:Math.round(axFS * 2.4), left:tPadL, right:15};
    const dW = W - pad.left - pad.right, dH = H - pad.top - pad.bottom;
    const maxV = Math.max(threshold * 3, sim.peakSignal * 1.3, 5);
    const buf = sim.signalBuf;
    ctx.strokeStyle = '#3b5380'; ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
      const py = pad.top + dH * (1 - i/5);
      ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(pad.left + dW, py); ctx.stroke();
      ctx.fillStyle = '#f8fafc'; ctx.font = 'bold ' + chartFS(W,'tickValue') + 'px JetBrains Mono'; ctx.textAlign = 'right';
      const val = (i/5) * maxV;
      ctx.fillText(val < 10 ? val.toFixed(1) : val.toFixed(0), pad.left - 4, py + 4);
    }
    const thY = pad.top + dH * (1 - threshold / maxV);
    if (thY > pad.top && thY < pad.top + dH) {
      ctx.strokeStyle = 'rgba(248,113,113,0.7)'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(pad.left, thY); ctx.lineTo(pad.left + dW, thY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#f87171'; ctx.font = 'bold ' + chartFS(W,'threshold') + 'px DM Sans'; ctx.textAlign = 'left';
      ctx.fillText('THRESHOLD', pad.left + 5, thY - 6);
    }
    if (buf.length > 1) {
      ctx.strokeStyle = 'rgba(74,222,128,0.32)'; ctx.lineWidth = 1.5; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(Math.abs(buf[i].vn) / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 3; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(buf[i].v / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.strokeStyle = 'rgba(74,222,128,0.18)'; ctx.lineWidth = 12; ctx.beginPath();
      for (let i = 0; i < buf.length; i++) {
        const px = pad.left + dW * (i / buf.length);
        const py = pad.top + dH * (1 - Math.min(buf[i].v / maxV, 1));
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.save(); ctx.translate(pad.left - tickW - axFS * 0.7, pad.top + dH/2); ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#f8fafc'; ctx.font = '900 ' + axFS + 'px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText('\u0394V\u2095 (mV)', 0, 0); ctx.restore();
    ctx.fillStyle = '#f8fafc'; ctx.font = '900 ' + axFS + 'px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText('Time (s)', pad.left + dW/2, pad.top + dH + axFS + 6);
    if (buf.length > 1) {
      const tMax = buf[buf.length-1].t, tMin = buf[0].t;
      ctx.fillStyle = '#f1f5f9'; ctx.font = 'bold ' + chartFS(W,'tickValue') + 'px JetBrains Mono'; ctx.textAlign = 'center';
      for (let i = 0; i <= 4; i++) {
        const t = tMin + (tMax - tMin) * i / 4;
        ctx.fillText(t.toFixed(1), pad.left + dW * (i / 4), pad.top + dH + chartFS(W,'tickValue') + 2);
      }
    }
    if (simState === 'running') {
      const nPassed = sim.beads.filter(b => b.passed).length;
      ctx.fillStyle = '#22d3ee'; ctx.font = '900 ' + chartFS(W,'title') + 'px DM Sans'; ctx.textAlign = 'right';
      ctx.fillText(nPassed + '/' + sim.beads.length + ' PASSED', pad.left + dW - 2, pad.top - 6);
    }
    if (simState === 'done') {
      ctx.fillStyle = '#22d3ee'; ctx.font = '900 ' + chartFS(W,'title') + 'px DM Sans'; ctx.textAlign = 'right';
      ctx.fillText('BATCH COMPLETE \u2014 ' + sim.beads.length + ' beads', pad.left + dW - 2, pad.top - 6);
    }
  }

  // ── Metrics ──
  const sim = simRef.current;
  const nDetected = sim.beads.filter(b => b.detected).length;
  const pulses = sim.pulseData;
  const detPulses = pulses.filter(p => p.detected);
  const meanPeak = detPulses.length > 0 ? detPulses.reduce((s,p) => s + p.peakDVH, 0) / detPulses.length : 0;
  const stdPeak = detPulses.length > 1 ? Math.sqrt(detPulses.reduce((s,p) => s + (p.peakDVH - meanPeak)**2, 0) / (detPulses.length - 1)) : 0;
  const cvPeak = meanPeak > 0 ? (stdPeak / meanPeak * 100) : 0;

  const fullPageMode = page !== 'simulator';
  const showHeader = page !== 'intro';

  if (page === 'intro') {
    return h('div', {className:'app designer-mode', style:{gridTemplateRows:'1fr'}},
      h(IntroPage, {onEnter: () => setPage('simulator')})
    );
  }

  return h('div', {className:'app' + (fullPageMode ? ' designer-mode' : '')},
    // ── Header ──
    h('div', {className:'header'},
      h('div', {className:'header-brand'},
        h('h1', null, h('span', {className:'brand'}, '\u00B5Flow'), ' 3D Microfluidic Hall Sensor'),
      ),
      h('div', {className:'nav-tabs'},
        h('button', {className:'nav-tab'+(page==='simulator'?' active':''), onClick:()=>setPage('simulator')}, '\u25b6 Simulator'),
        h('button', {className:'nav-tab'+(page==='designer'?' active':''), onClick:()=>setPage('designer')}, '\u2699 Designer'),
        h('button', {className:'nav-tab'+(page==='analysis'?' active':''), onClick:()=>setPage('analysis')}, '\ud83d\udcca Analysis'),
        h('button', {className:'nav-tab'+(page==='theory'?' active':''), onClick:()=>setPage('theory')}, '\ud83d\udcd6 Theory'),
        h('button', {className:'nav-tab'+(page==='fem'?' active':''), onClick:()=>setPage('fem')}, '\ud83d\udd2c FEM'),
      ),
      page === 'simulator' && h('div', {className:'header-metrics'},
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Material'),
          h('div', {className:'metric-value', style:{color:isCustomMat?'#94a3b8':activeMat.color}}, isCustomMat?'Custom':activeMat.id==='graphene-hbn'?'Gr/hBN':activeMat.name.split(' ')[0])
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Status'),
          h('span', {className:'status-badge '+simState}, simState === 'idle' ? 'IDLE' : simState === 'running' ? 'RUNNING' : 'COMPLETE')
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Detected'),
          h('div', {className:'metric-value g'}, nDetected + '/' + nBeads)
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'Peak \u0394V\u2095'),
          h('div', {className:'metric-value g'}, sim.peakSignal.toFixed(2) + ' mV')
        ),
        h('div', {className:'metric'},
          h('div', {className:'metric-label'}, 'R\u2095\u00b7\u03c3'),
          h('div', {className:'metric-value'}, fmtSci(activeRH * activeSigma, 2))
        ),
      ),
    ),

    h('div', {className:'app-copyright'}, '\u00A9 2025 Govindaraju & Hassan'),

    // ── Page content ──
    page === 'designer'
      ? h(DesignerPage, {matIdx, setMatIdx, customMat, setCustomMat,
          beadIdx, setBeadIdx, beadMode, setBeadMode, customBead, setCustomBead,
          sensMode, setSensMode, sensIdx, setSensIdx, customSensor, setCustomSensor,
          chH, setChH, flowVel, setFlowVel, B0, setB0, Vg, setVg,
          goToSim: () => setPage('simulator')})
      : page === 'analysis'
      ? h(AnalysisPage, {matIdx, customMat, beadIdx, beadMode, customBead,
          sensMode, sensIdx, customSensor, chH, flowVel, B0, vBias, threshold, fixedHeight, Vg})
      : page === 'theory'
      ? h(TheoryPage)
      : page === 'fem'
      ? h(FEMPage, {matIdx, customMat, beadIdx, beadMode, customBead,
          sensMode, sensIdx, customSensor, B0, vBias, fixedHeight, Vg})
      : h(React.Fragment, null,
        // ── Sidebar ──
        h('div', {className:'sidebar'},
          // Material indicator
          h('div', {className:'group'},
            h('div', {className:'group-title mat'}, 'Sensor Material'),
            h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
              h('span', {style:{fontSize:'12px',fontWeight:600,color:isCustomMat?'#94a3b8':activeMat.color}},
                isCustomMat ? 'Custom' : activeMat.name),
              h('button', {className:'preset-btn', style:{fontSize:'8px'}, onClick:()=>setPage('designer')}, 'Change \u2192'),
            ),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'R\u2095 = '), fmtSci(activeRH)),
              h('div', null, h('b',null,'\u03c3 = '), fmtSci(activeSigma), ' S/m'),
              h('div', null, h('b',null,'|S\u1d62| = '), fmtSci(mp.SI), ' V/AT'),
            ),
            // Gate voltage control (2D gate-tunable materials only)
            activeMat.gate && h('div', {style:{marginTop:'6px',paddingTop:'6px',borderTop:'1px solid var(--card-border)'}},
              h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
                h('span', {style:{fontSize:'9px',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:600}}, 'Gate Voltage'),
                h('button', {className:'preset-btn', style:{fontSize:'8px',padding:'1px 6px'},
                  onClick:()=>setVg(Vg === null ? 0 : null)},
                  Vg === null ? 'Enable' : 'Off'),
              ),
              Vg !== null && h(Slider, {label:'V\u1d33', value:Vg, min:activeMat.gate.Vg_range[0], max:activeMat.gate.Vg_range[1],
                step:Math.abs(activeMat.gate.Vg_range[1]-activeMat.gate.Vg_range[0])/100,
                unit:' V', onChange:setVg, disabled:simState==='running'}),
              Vg !== null && h('div', {className:'sim-info'},
                h('div', null, h('b',null,'n(V\u1d33) = '), fmtSci(mp.n), ' m\u207b\u00b2'),
                h('div', null, h('b',null,'V\u0043\u004e\u0050 = '), activeMat.gate.V_CNP, ' V'),
              ),
            ),
          ),

          // Sensor geometry
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Sensor Geometry'),
            h('div', {className:'mode-tabs', style:{marginBottom:'4px'}},
              h('button', {className:'mode-tab'+(sensMode==='preset'?' active':''), disabled:simState==='running', onClick:()=>setSensMode('preset')}, 'Preset'),
              h('button', {className:'mode-tab'+(sensMode==='custom'?' active':''), disabled:simState==='running', onClick:()=>setSensMode('custom')}, 'Custom'),
            ),
            sensMode === 'preset'
              ? h('div', {className:'preset-row'}, SENSOR_PRESETS.map((s, i) =>
                  h('button', {key:i, className:'preset-btn'+(sensIdx===i?' active':''),
                    disabled:simState==='running', onClick:()=>setSensIdx(i)}, s.name+' ('+s.label+')')
                ))
              : h('div', null,
                  h(NumField, {label:'Side w', value:+(customSensor.size*1e6).toFixed(1), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomSensor({...customSensor, size:v*1e-6})}),
                  h(NumField, {label:'Thickness t', value:+(customSensor.t*1e6).toFixed(2), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomSensor({...customSensor, t:v*1e-6})}),
                ),
            h(Slider, {label:'Bias Voltage', value:vBias, min:1, max:10, step:0.5, unit:' V', onChange:setVBias, disabled:simState==='running',
              desc:'Voltage applied across the Hall sensor. Higher bias = larger Hall voltage signal, but also more noise and power dissipation.'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'Area: '), (sensor.size*1e6).toFixed(1), '\u00d7', (sensor.size*1e6).toFixed(1), ' \u00b5m\u00b2'),
            ),
          ),

          // Channel
          h('div', {className:'group'},
            h('div', {className:'group-title ch'}, 'Microfluidic Channel'),
            h(Slider, {label:'Channel height', value:chH, min:10, max:200, step:5, unit:' \u00b5m', onChange:setChH, disabled:simState==='running',
              desc:'Height of the microfluidic channel (the enclosed tube beads flow through). Determines the Poiseuille flow profile and how close beads can pass to the sensor. Typical PDMS channels: 20\u2013100 \u00b5m.'}),
            h(Slider, {label:'Flow velocity v\u0304', value:flowVel, min:0.1, max:20, step:0.1, unit:' mm/s', onChange:setFlowVel, disabled:simState==='running',
              desc:'Mean flow velocity of the fluid carrying the beads. Controls how fast beads pass over the sensor and how long the detection window lasts. Higher velocity = shorter pulses.'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'Q: '), Q_uLmin < 0.001 ? Q_uLmin.toExponential(2) : Q_uLmin.toFixed(4), ' \u00b5L/min'),
            ),
          ),

          // Bead
          h('div', {className:'group'},
            h('div', {className:'group-title bead'}, 'Magnetic Bead'),
            h('div', {className:'mode-tabs', style:{marginBottom:'4px'}},
              h('button', {className:'mode-tab'+(beadMode==='preset'?' active':''), disabled:simState==='running', onClick:()=>setBeadMode('preset')}, 'Library'),
              h('button', {className:'mode-tab'+(beadMode==='custom'?' active':''), disabled:simState==='running', onClick:()=>setBeadMode('custom')}, 'Custom'),
            ),
            beadMode === 'preset'
              ? h('div', {className:'preset-row'}, BEAD_LIBRARY.map((p, i) =>
                  h('button', {key:p.id, className:'preset-btn'+(beadIdx===i?' active':''),
                    disabled:simState==='running', onClick:()=>setBeadIdx(i)}, p.label)
                ))
              : h('div', null,
                  h(NumField, {label:'Diameter', value:+(customBead.d*1e6).toFixed(2), unit:'\u00b5m', disabled:simState==='running',
                    onChange:v=>setCustomBead({...customBead, d:v*1e-6})}),
                  h(NumField, {label:'\u03bc\u1d63', value:customBead.mu_r, unit:'', disabled:simState==='running',
                    onChange:v=>setCustomBead({...customBead, mu_r:v})}),
                ),
            h(Slider, {label:'Batch size N', value:nBeads, min:1, max:50, step:1, unit:'', onChange:setNBeads, disabled:simState==='running',
              desc:'Number of beads to simulate in one batch. More beads give better statistics (mean, CV) but take longer to run.'}),
            h('div', {className:'sim-info'},
              h('div', null, h('b',null,'\u03c7\u2091\u1da0\u1da0 = '), (3*(bead.mu_r-1)/(bead.mu_r+2)).toFixed(3)),
              h('div', null, h('b',null,'m = '), fmtSci(mom), ' A\u00b7m\u00b2'),
            ),
          ),

          // Height mode
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Height Above Sensor'),
            h('div', {className:'mode-tabs'},
              h('button', {className:'mode-tab'+(heightMode==='fixed'?' active':''), disabled:simState==='running', onClick:()=>setHeightMode('fixed')}, 'Fixed'),
              h('button', {className:'mode-tab'+(heightMode==='range'?' active':''), disabled:simState==='running', onClick:()=>setHeightMode('range')}, 'Random'),
            ),
            heightMode === 'fixed'
              ? h(Slider, {label:'h (above sensor)', value:fixedHeight, min:Math.max(0.5, Math.ceil(bead.d*1e6*2)/1), max:50, step:0.5, unit:' \u00b5m', onChange:setFixedHeight, disabled:simState==='running',
                  desc:'Distance from bead center to sensor surface. Must exceed bead diameter so the bead does not physically overlap the sensor. Closer = stronger stray field but the dipole model loses accuracy below ~2\u00d7 bead radius.'})
              : h('div', null,
                  h(Slider, {label:'Min h', value:minHeight, min:Math.max(0.5, Math.ceil(bead.d*1e6*2)/1), max:30, step:0.5, unit:' \u00b5m', onChange:setMinHeight, disabled:simState==='running',
                    desc:'Minimum bead height in the random distribution. Clamped to at least one bead diameter above the sensor.'}),
                  h(Slider, {label:'Max h', value:maxHeight, min:1, max:50, step:0.5, unit:' \u00b5m', onChange:setMaxHeight, disabled:simState==='running',
                    desc:'Maximum bead height. Beads higher in the channel produce weaker signals but travel faster in Poiseuille flow.'}),
                ),
          ),

          // CHMA
          h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Halbach Array'),
            h(Slider, {label:'B\u2080 at sensor', value:B0, min:10, max:500, step:10, unit:' mT', onChange:setB0, disabled:simState==='running',
              desc:'External magnetic field from the Halbach array that magnetizes the beads. Stronger field = larger bead magnetic moment = stronger Hall signal. Typical NdFeB arrays: 100\u2013300 mT.'}),
          ),

          // Detection threshold
          h('div', {className:'group'},
            h('div', {className:'group-title det'}, 'Detection'),
            h(Slider, {label:'\u0394V\u2095 threshold', value:threshold, min:0.1, max:100, step:0.1, unit:' mV', onChange:setThreshold,
              desc:'Minimum Hall voltage signal to count a bead as "detected." Set above the noise floor but below the expected peak signal. Shown as the red dashed line on the trace.'}),
          ),

          // Batch results
          simState === 'done' && h('div', {className:'group'},
            h('div', {className:'group-title'}, 'Batch Results'),
            h('div', {className:'results-box'},
              h('div', {className:'rtitle'}, 'Pulse Analysis \u2014 ' + nBeads + ' beads'),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Detection'), h('span',{className:'val '+(nDetected===nBeads?'good':'warn')}, nDetected+'/'+nBeads+' ('+(nDetected/nBeads*100).toFixed(0)+'%)')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Mean peak'), h('span',{className:'val'}, meanPeak.toFixed(3)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Std dev'), h('span',{className:'val'}, stdPeak.toFixed(4)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'CV'), h('span',{className:'val '+(cvPeak<5?'good':cvPeak<15?'warn':'r')}, cvPeak.toFixed(1)+'%')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Max peak'), h('span',{className:'val good'}, sim.peakSignal.toFixed(3)+' mV')),
              h('div', {className:'row'}, h('span',{className:'lbl'},'Material'), h('span',{className:'val'}, isCustomMat?'Custom':activeMat.name)),
            ),
            h('button', {className:'export-csv-btn', onClick:() => {
              const headers = ['Bead_ID', 'Height_um', 'Peak_DVH_mV', 'Detected'];
              const rows = pulses.map(p => [p.id, p.height_um.toFixed(2), p.peakDVH.toFixed(6), p.detected ? 'Yes' : 'No']);
              downloadCSV('uflow_batch_' + nBeads + 'beads.csv', headers, rows);
            }}, '\u2913 Export Batch CSV'),
            pulses.length > 0 && pulses.length <= 50 && h('div', {style:{maxHeight:'200px',overflowY:'auto',marginTop:'4px'}},
              h('table', {className:'pulse-table'},
                h('thead', null, h('tr', null, h('th',null,'#'), h('th',null,'r (\u00b5m)'), h('th',null,'Peak (mV)'), h('th',null,''))),
                h('tbody', null, pulses.map(p =>
                  h('tr', {key:p.id}, h('td',null,p.id), h('td',null,p.height_um.toFixed(1)),
                    h('td',null,p.peakDVH.toFixed(3)),
                    h('td',{className:p.detected?'det':'miss'}, p.detected?'\u2713':'\u2717'))
                ))
              )
            ),
          ),
        ),

        // ── 3D Scene ──
        h('div', {className:'scene-container', ref:sceneContRef},
          h('div', {className:'scale-note'}, '3D visualization not to scale'),
          h('div', {className:'ctrl-bar'},
            simState === 'idle' && h('button', {className:'ctrl-btn run', onClick:startBatch}, '\u25B6 Run Batch ('+nBeads+' beads)'),
            simState === 'running' && h('button', {className:'ctrl-btn', onClick:()=>setSpeed(s=>s===1?2:s===2?5:s===5?10:1)}, 'Speed '+speed+'\u00D7'),
            (simState === 'running' || simState === 'done') && h('button', {className:'ctrl-btn danger', onClick:resetSim}, 'Reset'),
            simState === 'done' && h('button', {className:'ctrl-btn run', onClick:startBatch}, '\u21BB Re-run'),
          ),
        ),

        // ── Signal Trace ──
        h('div', {className:'trace-panel', ref:traceContRef},
          h('div', {className:'trace-label'}, 'Real-time Hall Voltage \u2014 \u0394V\u2095(t)'),
          h('canvas', {ref:traceRef}),
        ),
      ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
